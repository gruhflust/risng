---
- name: Narrow down target MAC addresses (dc-vLAN-test)
  hosts: localhost
  gather_facts: false

  vars:
    netbox_default_username: "risng"
    dc_vlan_default_base_url: "https://cmdb01.stable.dc.dev.int.dfs.de"
    dc_vlan_default_report_stem: "{{ lookup('env', 'HOME') }}/dc-vLAN-test"
    dc_vlan_control_template: "templates/dc_vlan_test_control.yml.j2"
    dc_vlan_stage_defaults:
      racks:
        title: "Racks"
        endpoint: "/api/dcim/racks/"
        description: "Rack list as the entry point for further narrowing."
        query_defaults:
          limit: 0
        summary_fields:
          - { label: "Rack", path: "name" }
          - { label: "Site", path: "site.name" }
          - { label: "Location", path: "location.name" }
          - { label: "Status", path: "status.label" }
      devices:
        title: "Devices"
        endpoint: "/api/dcim/devices/"
        description: "Devices in the filtered racks or sites."
        query_defaults:
          limit: 0
        summary_fields:
          - { label: "Device", path: "name" }
          - { label: "Rack", path: "rack.name" }
          - { label: "Role", path: "device_role.name" }
          - { label: "Status", path: "status.label" }
      interfaces:
        title: "Interfaces"
        endpoint: "/api/dcim/interfaces/"
        description: "Interfaces of the selected devices including MAC address."
        query_defaults:
          limit: 0
        summary_fields:
          - { label: "Interface", path: "name" }
          - { label: "Device", path: "device.name" }
          - { label: "MAC", path: "mac_address" }
          - { label: "Enabled", path: "enabled" }
    dc_vlan_fallback_summary_fields:
      - { label: "Name", path: "name" }
      - { label: "ID", path: "id" }

  tasks:
    - name: Initialize NetBox credentials
      ansible.builtin.set_fact:
        netbox_username: "{{ netbox_default_username }}"
        netbox_token: ""

    - name: Define path to token file
      ansible.builtin.set_fact:
        netbox_token_file_path: "{{ lookup('env', 'HOME') }}/token.md"

    - name: Check if a token file exists
      ansible.builtin.stat:
        path: "{{ netbox_token_file_path }}"
      register: netbox_token_file_stat

    - name: Read NetBox token from token file
      ansible.builtin.slurp:
        src: "{{ netbox_token_file_path }}"
      register: netbox_token_file_content
      when:
        - netbox_token_file_stat.stat.exists
        - netbox_token_file_stat.stat.isreg | default(false)

    - name: Apply NetBox token from token file
      ansible.builtin.set_fact:
        netbox_token: "{{ netbox_token_file_content.content | b64decode | trim }}"
      when:
        - netbox_token_file_stat.stat.exists
        - netbox_token_file_stat.stat.isreg | default(false)
        - netbox_token_file_content is defined
        - netbox_token_file_content.content | b64decode | trim | length > 0

    - name: Prompt for NetBox API token
      ansible.builtin.pause:
        prompt: "NetBox API Token"
        echo: no
      register: netbox_token_prompt
      when: netbox_token | length == 0

    - name: Apply prompted NetBox token
      ansible.builtin.set_fact:
        netbox_token: "{{ netbox_token_prompt.user_input | default('') | trim }}"
      when:
        - netbox_token | length == 0
        - netbox_token_prompt is defined

    - name: Ensure a NetBox API token was provided
      ansible.builtin.fail:
        msg: "[dc-vLAN-test] → No API token provided – aborting."
      when: netbox_token | length == 0

    - name: Load control file for dc-vLAN-test
      ansible.builtin.set_fact:
        dc_vlan_control_raw: "{{ lookup('template', dc_vlan_control_template) }}"

    - name: Parse control file
      ansible.builtin.set_fact:
        dc_vlan_control: "{{ dc_vlan_control_raw | from_yaml }}"

    - name: Validate control file structure
      ansible.builtin.fail:
        msg: "[dc-vLAN-test] → Control file {{ dc_vlan_control_template }} does not contain valid YAML."
      when: dc_vlan_control is not mapping

    - name: Collect configuration from control file
      ansible.builtin.set_fact:
        netbox_base_url: "{{ (dc_vlan_control.base_url | default('') | trim) | default(dc_vlan_default_base_url, true) }}"
        netbox_report_stem: "{{ (dc_vlan_control.report_stem | default('') | trim) | default(dc_vlan_default_report_stem, true) }}"
        dc_vlan_stage_list: "{{ dc_vlan_control.stages | default([]) }}"

    - name: Ensure at least one query is defined
      ansible.builtin.fail:
        msg: "[dc-vLAN-test] → The control file does not define any queries (stages)."
      when: dc_vlan_stage_list | length == 0

    - name: Define output paths for the report
      ansible.builtin.set_fact:
        netbox_report_json_path: "{{ netbox_report_stem }}.json"
        netbox_report_yaml_path: "{{ netbox_report_stem }}.yml"

    - name: Normalize NetBox base URL
      ansible.builtin.set_fact:
        dc_vlan_base_url: "{{ (netbox_base_url | regex_replace('/+$', '')) | default(dc_vlan_default_base_url, true) }}"

    - name: Initialize stage report cache
      ansible.builtin.set_fact:
        dc_vlan_stage_reports: []

    - name: Process defined NetBox queries
      ansible.builtin.include_tasks: "dc_vlan_process_stage_tasks.yml"
      loop: "{{ dc_vlan_stage_list }}"
      loop_control:
        loop_var: stage_def
      vars:
        stage_defaults: "{{ dc_vlan_stage_defaults.get(stage_def.id | default(''), {}) }}"
        stage_index: "{{ ansible_loop.index }}"

    - name: Determine report timestamp
      ansible.builtin.set_fact:
        netbox_report_generated_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Build report metadata
      ansible.builtin.set_fact:
        netbox_report_metadata:
          title: "dc-vLAN-test – NetBox queries"
          username: "{{ (netbox_username | default('') | trim) | default('unknown user', true) }}"
          generated_at: "{{ netbox_report_generated_at }}"
          base_url: "{{ netbox_base_url }}"
          stage_count: "{{ dc_vlan_stage_reports | length }}"

    - name: Create consolidated report
      ansible.builtin.set_fact:
        netbox_report_payload:
          metadata: "{{ netbox_report_metadata }}"
          stages: "{{ dc_vlan_stage_reports }}"

    - name: Write report as JSON file
      ansible.builtin.copy:
        dest: "{{ netbox_report_json_path }}"
        content: "{{ netbox_report_payload | to_nice_json }}"
        mode: "0644"

    - name: Write report as YAML file
      ansible.builtin.copy:
        dest: "{{ netbox_report_yaml_path }}"
        content: "{{ netbox_report_payload | to_nice_yaml }}"
        mode: "0644"

    - name: Report artifact locations
      ansible.builtin.debug:
        msg:
          - "[dc-vLAN-test] → JSON: {{ netbox_report_json_path }}"
          - "[dc-vLAN-test] → YAML: {{ netbox_report_yaml_path }}"
