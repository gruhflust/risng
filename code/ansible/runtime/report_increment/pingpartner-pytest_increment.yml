---
# pingpartner pytest wrapper – executes helper validation locally

- name: Run pingpartner helper pytest suite
  hosts: localhost
  gather_facts: false
  become: true
  become_user: "{{ run_as_user }}"
  vars:
    run_as_user: risng
    # Increment-specific helper and tests live alongside this playbook for isolation
    pingpartner_python_dir: "{{ playbook_dir | realpath }}/pingpartner_helper"
    user_home: "/home/{{ run_as_user }}"
  tasks:
    - name: Ensure pingpartner cache directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ user_home }}/.cache"
        - "{{ user_home }}/.cache/pycache"
        - "{{ user_home }}/.cache/pytest_cache"

    - name: Execute pytest for pingpartner helper
      ansible.builtin.command:
        cmd: python3 -m pytest test_pingpartner_helper_increment.py -vv
        chdir: "{{ pingpartner_python_dir }}"
      environment:
        PYTHONPYCACHEPREFIX: "{{ user_home }}/.cache/pycache"
        PYTEST_ADDOPTS: "-o cache_dir={{ user_home }}/.cache/pytest_cache"
      register: pingpartner_pytest
      changed_when: false
      failed_when: pingpartner_pytest.rc != 0

    - name: Show pytest summary
      ansible.builtin.debug:
        msg:
          - "Pytest return code: {{ pingpartner_pytest.rc }}"
          - "Stdout:\n{{ pingpartner_pytest.stdout }}"
          - "Stderr:\n{{ pingpartner_pytest.stderr }}"

    - name: Run pingpartner healthcheck and store JSON report in home directory
      ansible.builtin.shell: |
        set -euo pipefail
        python3 - <<'PYCODE'
        from pathlib import Path

        from pingpartner_helper_increment import run_pingpartner_healthcheck


        output_path = Path("{{ user_home }}") / "test_results.json"
        run_pingpartner_healthcheck(output_path=output_path)
        print(f"Stored pingpartner results at {output_path}")
        PYCODE
      args:
        chdir: "{{ pingpartner_python_dir }}"
        executable: /bin/bash
      environment:
        PYTHONPYCACHEPREFIX: "{{ user_home }}/.cache/pycache"
      register: pingpartner_healthcheck
      changed_when: true
      failed_when: pingpartner_healthcheck.rc != 0

    - name: Verify pingpartner results JSON exists
      ansible.builtin.stat:
        path: "{{ user_home }}/test_results.json"
      register: pingpartner_results_json
      failed_when: not pingpartner_results_json.stat.exists

    - name: Show pingpartner results location
      ansible.builtin.debug:
        msg: "Pingpartner results written to {{ pingpartner_results_json.stat.path }}"

    - name: Ensure pingpartner report collection directory exists
      ansible.builtin.file:
        path: "{{ user_home }}/reportcollection"
        state: directory
        mode: "0755"

    - name: Archive successful pingpartner tests for incremental reports
      ansible.builtin.shell: |
        set -euo pipefail
        python3 - <<'PYCODE'
        import json
        from pathlib import Path
        from datetime import datetime

        results_path = Path("{{ user_home }}/test_results.json")
        collection_dir = Path("{{ user_home }}/reportcollection")

        def strip_json_comments(content: str) -> str:
          return "\n".join(
            line for line in content.splitlines() if not line.lstrip().startswith("#")
          )

        try:
          payload = json.loads(strip_json_comments(results_path.read_text(encoding="utf-8")))
        except Exception as exc:  # noqa: BLE001
          raise SystemExit(f"Failed to parse pingpartner results: {exc}")

        if not isinstance(payload, list):
          raise SystemExit("Pingpartner results are not a list")

        collection_dir.mkdir(parents=True, exist_ok=True)

        def sanitize_filename(value: str) -> str:
          safe = "".join(ch if ch.isalnum() or ch in {"-", "_", "."} else "_" for ch in value)
          return safe.strip("._") or "result"

        for entry in payload:
          if not isinstance(entry, dict):
            continue
          if str(entry.get("status", "")).lower() != "success":
            continue

          pingpartner = str(entry.get("pingpartner") or "unknown").strip()
          tested_at = str(entry.get("tested_at") or "").strip()
          if not tested_at:
            tested_at = datetime.utcnow().isoformat() + "Z"

          filename = sanitize_filename(f"{pingpartner}_{tested_at}") + ".json"
          data = {
            "pingpartner": pingpartner,
            "tested_at": tested_at,
            "status": "success",
          }
          (collection_dir / filename).write_text(json.dumps(data, indent=2), encoding="utf-8")
        PYCODE
      args:
        executable: /bin/bash
      changed_when: true

    - name: Remove repository-local pycache and pytest cache artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ pingpartner_python_dir }}/__pycache__"
        - "{{ pingpartner_python_dir }}/.pytest_cache"
