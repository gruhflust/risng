---
# EANTCRAND variant of cheaplanwatch.
# Randomized per-sample msg_size selection according to EANTC weights.

- name: Start cheaplanwatch_eantcrand centrally and prepare target clients
  hosts: localhost
  gather_facts: false
  become: true
  become_user: risng
  vars:
    run_as_user: risng
    user_home: "/home/{{ run_as_user }}"
    run_id: "{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}"
    workspace: "{{ user_home }}/cheaplanwatch_eantcrand"
    result_json: "{{ workspace }}/{{ run_id }}-testrun.json"
    result_pdf: "{{ workspace }}/{{ run_id }}-testrun.pdf"
    qperf_targets_file: "{{ playbook_dir }}/qperf_targets.yml"
    qperf_server_ip: "10.228.229.7"
    qperf_server_port: 19778
    watch_duration_sec: "{{ lookup('env', 'CHEAPLANWATCH_DURATION') | default('90', true) }}"
    watch_interval_sec: "{{ lookup('env', 'CHEAPLANWATCH_INTERVAL') | default('2', true) }}"
    server_pid_file: "{{ workspace }}/cheaplanwatch-qperf.pid"
    server_log: "{{ workspace }}/cheaplanwatch-qperf.log"

  tasks:
    - name: Ensure workspace exists
      ansible.builtin.file:
        path: "{{ workspace }}"
        state: directory
        owner: "{{ run_as_user }}"
        group: "{{ run_as_user }}"
        mode: "0755"

    - name: Load qperf target definitions
      ansible.builtin.include_vars:
        file: "{{ qperf_targets_file }}"

    - name: Stop stale qperf server if any
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -f "{{ server_pid_file }}" ]; then
          kill "$(cat "{{ server_pid_file }}")" >/dev/null 2>&1 || true
          rm -f "{{ server_pid_file }}"
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Start qperf server for cheaplanwatch_eantcrand
      ansible.builtin.shell: |
        set -euo pipefail
        qperf -lp {{ qperf_server_port }} > "{{ server_log }}" 2>&1 &
        echo $! > "{{ server_pid_file }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for qperf server port
      ansible.builtin.wait_for:
        host: "{{ qperf_server_ip }}"
        port: "{{ qperf_server_port }}"
        timeout: 15

    - name: Probe SSH reachability of qperf targets
      ansible.builtin.wait_for:
        host: "{{ item.ip }}"
        port: 22
        timeout: 3
      loop: "{{ qperf_targets | default([]) }}"
      register: target_probe
      ignore_errors: true

    - name: Add online targets to runtime group
      ansible.builtin.add_host:
        name: "{{ item.item.name }}"
        groups: cheaplanwatch_clients
        ansible_host: "{{ item.item.ip }}"
        ansible_user: root
        ansible_python_interpreter: auto_silent
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      loop: "{{ target_probe.results | default([]) }}"
      when: item.failed is not defined or not item.failed

    - name: Publish run metadata
      ansible.builtin.set_fact:
        cheaplanwatch_run_id: "{{ run_id }}"
        cheaplanwatch_workspace: "{{ workspace }}"
        cheaplanwatch_result_json: "{{ result_json }}"
        cheaplanwatch_result_pdf: "{{ result_pdf }}"
        cheaplanwatch_server_ip: "{{ qperf_server_ip }}"
        cheaplanwatch_server_port: "{{ qperf_server_port }}"
        cheaplanwatch_duration: "{{ watch_duration_sec }}"
        cheaplanwatch_interval: "{{ watch_interval_sec }}"

- name: Run cheaplanwatch_eantcrand collector on clients (parallel)
  hosts: cheaplanwatch_clients
  gather_facts: false
  become: true
  become_user: root
  vars:
    collect_script_remote: /tmp/cheaplanwatch_client_collect_eantcrand.sh
    collect_json_remote: /tmp/cheaplanwatch-{{ hostvars['localhost'].cheaplanwatch_run_id }}.json
    collect_log_remote: /tmp/cheaplanwatch-{{ hostvars['localhost'].cheaplanwatch_run_id }}.log
  tasks:
    - name: Copy collector script to client
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/cheaplanwatch_client_collect_eantcrand.sh"
        dest: "{{ collect_script_remote }}"
        mode: "0755"

    - name: Execute collector (duration-bound)
      ansible.builtin.command:
        cmd: >-
          {{ collect_script_remote }}
          {{ hostvars['localhost'].cheaplanwatch_server_ip }}
          {{ hostvars['localhost'].cheaplanwatch_server_port }}
          {{ hostvars['localhost'].cheaplanwatch_duration }}
          {{ hostvars['localhost'].cheaplanwatch_interval }}
          {{ collect_json_remote }}
          {{ collect_log_remote }}
      changed_when: false
      failed_when: false

    - name: Fetch client JSON raw data
      ansible.builtin.slurp:
        src: "{{ collect_json_remote }}"
      register: collect_json_raw
      failed_when: false

    - name: Store client raw result on hostvars
      ansible.builtin.set_fact:
        cheaplanwatch_client_raw: "{{ (collect_json_raw.content | b64decode | from_json) if (collect_json_raw is defined and collect_json_raw.content is defined) else {} }}"

- name: Aggregate client raw data and render final local report (EANTCRAND)
  hosts: localhost
  gather_facts: false
  become: true
  become_user: risng
  vars:
    run_id: "{{ hostvars['localhost'].cheaplanwatch_run_id }}"
    workspace: "{{ hostvars['localhost'].cheaplanwatch_workspace }}"
    result_json: "{{ hostvars['localhost'].cheaplanwatch_result_json }}"
    result_pdf: "{{ hostvars['localhost'].cheaplanwatch_result_pdf }}"
    report_script: "{{ playbook_dir }}/files/cheaplanwatch_report_eantcrand.py"
  tasks:
    - name: Build aggregate payload
      ansible.builtin.set_fact:
        cheaplanwatch_aggregate:
          report_banner: "risng - Cloud Host Endpoint Analysis Probe"
          run_id: "{{ run_id }}"
          generated_at: "{{ run_id }}"
          note: "EANTC traffic mix enabled (randomized)"
          server_ip: "{{ hostvars['localhost'].cheaplanwatch_server_ip }}"
          server_port: "{{ hostvars['localhost'].cheaplanwatch_server_port }}"
          clients: >-
            {{
              (groups['cheaplanwatch_clients'] | default([]))
              | map('extract', hostvars)
              | map(attribute='cheaplanwatch_client_raw')
              | select('defined')
              | list
            }}

    - name: Write aggregate JSON on server
      ansible.builtin.copy:
        dest: "{{ result_json }}"
        mode: "0644"
        content: "{{ cheaplanwatch_aggregate | to_nice_json }}"

    - name: Render cheaplanwatch_eantcrand PDF/HTML report on server
      ansible.builtin.command:
        cmd: "python3 {{ report_script }} {{ result_json }} {{ result_pdf }}"
      changed_when: false

    - name: Stop qperf server
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -f "{{ workspace }}/cheaplanwatch-qperf.pid" ]; then
          kill "$(cat "{{ workspace }}/cheaplanwatch-qperf.pid")" >/dev/null 2>&1 || true
          rm -f "{{ workspace }}/cheaplanwatch-qperf.pid"
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Show report locations
      ansible.builtin.debug:
        msg:
          - "cheaplanwatch_eantcrand JSON: {{ result_json }}"
          - "cheaplanwatch_eantcrand HTML: {{ result_pdf | regex_replace('\\.pdf$', '.html') }}"
          - "cheaplanwatch_eantcrand PDF:  {{ result_pdf }}"
