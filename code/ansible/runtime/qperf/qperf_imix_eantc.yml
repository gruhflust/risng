# EANTC IMIX mix (extracted from botbrain cheaptesttool/traffic-mix-eanc.png)
#
# Table title: "IMIX with Jumbo Frame".
# We map the table's "Packet Size (Byte)" values to qperf msg_size entries.
#
# IMPORTANT: This file is intentionally separate from qperf_imix.yml.
# The legacy suite must remain reproducible; use cheaplantest_eantc.yml.

qperf_imix_profile:
  name: "eantc-imix-with-jumbo"
  description: >
    EANTC-style IMIX (with tiny jumbo component). Extracted from EANTC mix table.
    Weight total: 10002. Avg frame size (L2) in source table: 553.91B.

  # qperf msg_size syntax supports weighted mixes. We use discrete sizes by setting min=max.
  # Format used elsewhere in this repo: "min:max:*repeat".
  msg_sizes:
    - "60:60:*5243"      # 52.42% count, 7.38% bandwidth (L2)
    - "132:132:*861"     # 8.61% count, 2.33% bandwidth (L2)
    - "296:296:*273"     # 2.73% count, 1.55% bandwidth (L2)
    - "468:468:*233"     # 2.33% count, 2.04% bandwidth (L2)
    - "557:557:*230"     # 2.30% count, 2.39% bandwidth (L2)
    - "952:952:*127"     # 1.27% count, 2.22% bandwidth (L2)
    - "1010:1010:*151"   # 1.51% count, 2.80% bandwidth (L2)
    - "1500:1500:*2882"  # 28.81% count, 78.97% bandwidth (L2)
    - "8800:8800:*2"     # 0.02% count, 0.32% bandwidth (L2)

qperf_imix_tests:
  - name: "tcp_bandwidth_imix"
    args: "tcp_bw -oo msg_size:{msg_size}"
    command: "tcp_bw"
    description: "TCP throughput using the IMIX msg_size profile."
  - name: "udp_bandwidth_imix"
    args: "udp_bw -oo msg_size:{msg_size}"
    command: "udp_bw"
    description: "UDP throughput using the IMIX msg_size profile."
  - name: "tcp_latency_imix"
    args: "tcp_lat -oo msg_size:{msg_size}"
    command: "tcp_lat"
    description: "TCP one-way latency under the same IMIX msg_size profile."
  - name: "udp_latency_imix"
    args: "udp_lat -oo msg_size:{msg_size}"
    command: "udp_lat"
    description: "UDP one-way latency under the same IMIX msg_size profile."
