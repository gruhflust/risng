---
# EANTC variant of cheaplanwatchdeploy.
# Keeps legacy cheaplanwatchdeploy.yml unchanged.

- name: Deploy cheaplanwatch_eantc runtime payload to clients
  hosts: localhost
  gather_facts: false
  become: true
  become_user: risng
  vars:
    qperf_targets_file: "{{ playbook_dir }}/qperf_targets.yml"
    cheaplanwatch_payload: "/var/lib/tftpboot/runtime/qperf/cheaplanwatch-client_eantc.sh"
  tasks:
    - name: Load qperf target definitions
      ansible.builtin.include_vars:
        file: "{{ qperf_targets_file }}"

    - name: Probe SSH reachability of targets
      ansible.builtin.wait_for:
        host: "{{ item.ip }}"
        port: 22
        timeout: 3
      loop: "{{ qperf_targets | default([]) }}"
      register: target_probe
      ignore_errors: true

    - name: Add online targets to deploy group
      ansible.builtin.add_host:
        name: "{{ item.item.name }}"
        groups: cheaplanwatch_clients_online
        ansible_host: "{{ item.item.ip }}"
        ansible_user: root
        ansible_python_interpreter: auto_silent
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      loop: "{{ target_probe.results | default([]) }}"
      when: item.failed is not defined or not item.failed

    - name: Show selected clients
      ansible.builtin.debug:
        msg: "cheaplanwatchdeploy_eantc targets: {{ groups['cheaplanwatch_clients_online'] | default([]) }}"

- name: Copy payload to clients
  hosts: cheaplanwatch_clients_online
  gather_facts: false
  become: true
  become_user: root
  vars:
    cheaplanwatch_payload: "/var/lib/tftpboot/runtime/qperf/cheaplanwatch-client_eantc.sh"
  tasks:
    - name: Ensure cheaplanwatch cache directory exists
      ansible.builtin.file:
        path: /var/cache/cheaplanwatch
        state: directory
        mode: "0755"

    - name: Deploy latest cheaplanwatch_eantc payload to client cache
      ansible.builtin.copy:
        src: "{{ cheaplanwatch_payload }}"
        dest: /var/cache/cheaplanwatch/cheaplanwatch-client_eantc.sh
        mode: "0755"

    - name: Deploy latest cheaplanwatch_eantc payload to direct client path
      ansible.builtin.copy:
        src: "{{ cheaplanwatch_payload }}"
        dest: /usr/local/sbin/cheaplanwatch-client-runtime_eantc.sh
        mode: "0755"

    - name: Show deployed header line
      ansible.builtin.command:
        cmd: head -n 3 /var/cache/cheaplanwatch/cheaplanwatch-client_eantc.sh
      changed_when: false
      failed_when: false
