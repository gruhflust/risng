---
# EANTC variant of cheaplantest.
# Keeps legacy cheaplantest.yml unchanged.

- name: Start cheaplantest_eantc qperf server and prepare targets
  hosts: localhost
  gather_facts: true
  become: true
  become_user: "{{ run_as_user }}"
  vars:
    run_as_user: risng
    user_home: "/home/{{ run_as_user }}"
    qperf_workspace: "{{ user_home }}/cheaplantest_eantc"
    qperf_targets_file: "{{ playbook_dir }}/qperf_targets.yml"
    qperf_imix_file: "{{ playbook_dir }}/qperf_imix_eantc.yml"
    qperf_run_id: "{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}"
    qperf_result_path: "{{ qperf_workspace }}/{{ qperf_run_id }}-testrun.json"
    qperf_server_port: 19775
    qperf_server_pid_file: "{{ qperf_workspace }}/qperf-server.pid"
    qperf_server_log: "{{ qperf_workspace }}/qperf-server.log"
    qperf_imix_config_path: "{{ qperf_workspace }}/imix-{{ qperf_run_id }}.conf"
    qperf_imix_msg_sizes: []
    qperf_server_ip: "10.228.229.7"
    qperf_server_vlan_ips: {}

    # Note: We do NOT embed/copy PNGs into reports. The PDF renders a text description of the mix.

  tasks:
    - name: Ensure cheaplantest_eantc workspace exists
      ansible.builtin.file:
        path: "{{ qperf_workspace }}"
        state: directory
        mode: "0755"
        owner: "{{ run_as_user }}"
        group: "{{ run_as_user }}"

    - name: Load qperf target definitions
      ansible.builtin.include_vars:
        file: "{{ qperf_targets_file }}"

    - name: Load qperf test definitions (EANTC)
      ansible.builtin.include_vars:
        file: "{{ qperf_imix_file }}"

    - name: Render IMIX config file (EANTC)
      ansible.builtin.copy:
        dest: "{{ qperf_imix_config_path }}"
        mode: "0644"
        owner: "{{ run_as_user }}"
        group: "{{ run_as_user }}"
        content: |
          # qperf IMIX config generated by cheaplantest_eantc
          # profile: {{ qperf_imix_profile.name }}
          # description: {{ qperf_imix_profile.description }}
          msg_sizes={{ (qperf_imix_profile.msg_sizes | default([])) | join(',') }}

    - name: Store IMIX msg_size profiles for substitution
      ansible.builtin.set_fact:
        qperf_imix_msg_sizes: "{{ qperf_imix_profile.msg_sizes | default([]) }}"

    - name: Normalize qperf targets with VLAN paths
      ansible.builtin.set_fact:
        qperf_targets_normalized: >-
          {%- set targets = [] -%}
          {%- for host in qperf_targets -%}
          {%- set paths = [] -%}
          {%- if host.ip is defined -%}
          {%- set _ = paths.append({
            "vlan": "native",
            "client_ip": host.ip,
            "server_ip": qperf_server_ip
          }) -%}
          {%- endif -%}
          {%- set _ = targets.append(host | combine({"paths": paths})) -%}
          {%- endfor -%}
          {{ targets }}

    - name: Ensure no stale qperf server process is running
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -f "{{ qperf_server_pid_file }}" ]; then
          kill "$(cat "{{ qperf_server_pid_file }}")" >/dev/null 2>&1 || true
          rm -f "{{ qperf_server_pid_file }}"
        fi
        ps -eo pid=,args= | awk '$2=="qperf" && $3=="-lp" && $4=="{{ qperf_server_port }}" {print $1}' | while read -r pid; do
          [ -n "$pid" ] && kill "$pid" >/dev/null 2>&1 || true
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Start qperf server in background (EANTC)
      ansible.builtin.shell: |
        set -euo pipefail
        qperf -lp {{ qperf_server_port }} > "{{ qperf_server_log }}" 2>&1 &
        echo $! > "{{ qperf_server_pid_file }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Store cheaplantest_eantc run metadata
      ansible.builtin.set_fact:
        cheaplantest_run_id: "{{ qperf_run_id }}"
        cheaplantest_result_path: "{{ qperf_result_path }}"
        cheaplantest_server_port: "{{ qperf_server_port }}"
        cheaplantest_server_log: "{{ qperf_server_log }}"
        cheaplantest_server_pid_file: "{{ qperf_server_pid_file }}"
        cheaplantest_imix_config_path: "{{ qperf_imix_config_path }}"
        cheaplantest_imix_profile: "{{ qperf_imix_profile }}"
        cheaplantest_imix_msg_sizes: "{{ qperf_imix_msg_sizes }}"
        cheaplantest_server_ip: "{{ qperf_server_ip }}"
        cheaplantest_server_vlan_ips: "{{ qperf_server_vlan_ips }}"

    - name: Wait for qperf server port
      ansible.builtin.wait_for:
        host: "{{ qperf_server_ip }}"
        port: "{{ qperf_server_port }}"
        delay: 1
        timeout: 20

    - name: Register qperf targets for remote execution
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: qperf_clients
        ansible_host: "{{ item.ip }}"
        ansible_user: "{{ item.ssh_user | default('root') }}"
        ansible_python_interpreter: auto_silent
        qperf_paths: "{{ item.paths }}"
        qperf_role: "qperf-client"
        qperf_mac: "{{ item.mac | default('') }}"
      loop: "{{ qperf_targets_normalized }}"

- name: Run qperf tests from remote clients
  hosts: qperf_clients
  gather_facts: false
  become: true
  become_user: root
  vars:
    qperf_server_port: 19775
    qperf_imix_config_path: "/tmp/cheaplantest-imix.conf"
  tasks:
    - name: Check client reachability
      ansible.builtin.wait_for_connection:
        timeout: 5
      register: qperf_reachability
      ignore_errors: true

    - name: Mark client reachability
      ansible.builtin.set_fact:
        qperf_client_reachable: "{{ (qperf_reachability is defined) and (qperf_reachability.failed is not defined or not qperf_reachability.failed) }}"

- name: Build reachable client group
  hosts: localhost
  gather_facts: false
  vars:
    qperf_reachable_clients: >-
      {%- set hosts = [] -%}
      {%- for host in groups['qperf_clients'] | default([]) -%}
      {%- if hostvars[host].qperf_client_reachable | default(false) -%}
      {%- set _ = hosts.append(host) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ hosts }}
    qperf_unreachable_results: >-
      {%- set results = [] -%}
      {%- for host in groups['qperf_clients'] | default([]) -%}
      {%- if not (hostvars[host].qperf_client_reachable | default(false)) -%}
      {%- set _ = results.append({
        "target": host,
        "address": hostvars[host].ansible_host | default(""),
        "role": hostvars[host].qperf_role | default("qperf-client"),
        "status": "unreachable",
        "error": hostvars[host].qperf_reachability.msg | default("unreachable")
      }) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ results }}
  tasks:
    - name: Register reachable qperf clients
      ansible.builtin.add_host:
        name: "{{ item }}"
        groups: qperf_clients_ready
      loop: "{{ qperf_reachable_clients }}"

    - name: Store unreachable qperf results
      ansible.builtin.set_fact:
        qperf_unreachable_results: "{{ qperf_unreachable_results }}"

- name: Run qperf tests from reachable clients (EANTC)
  hosts: qperf_clients_ready
  serial: 1
  gather_facts: false
  become: true
  become_user: root
  vars:
    qperf_server_port: 19775
    qperf_imix_config_path: "/tmp/cheaplantest-imix.conf"
  tasks:
    - name: Load qperf test definitions (EANTC)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/qperf_imix_eantc.yml"

    - name: Deploy IMIX config to client
      ansible.builtin.copy:
        dest: "{{ qperf_imix_config_path }}"
        mode: "0644"
        content: |
          # qperf IMIX config generated by cheaplantest_eantc
          # profile: {{ hostvars['localhost'].cheaplantest_imix_profile.name }}
          # description: {{ hostvars['localhost'].cheaplantest_imix_profile.description }}
          msg_sizes={{ (hostvars['localhost'].cheaplantest_imix_profile.msg_sizes | default([])) | join(',') }}

    - name: Discover supported qperf tests on client
      ansible.builtin.command:
        cmd: "qperf --help tests"
      register: qperf_help_tests
      changed_when: false
      failed_when: false

    - name: Build available qperf test set
      ansible.builtin.set_fact:
        qperf_available_tests: "{{ (qperf_help_tests.stdout | default('') | regex_findall('[a-z0-9_]+')) | unique }}"

    - name: Build supported and skipped qperf test sets
      ansible.builtin.set_fact:
        qperf_supported_tests: "{{ qperf_imix_tests | selectattr('command', 'in', qperf_available_tests) | list if (qperf_help_tests.rc | default(1)) == 0 else qperf_imix_tests }}"
        qperf_skipped_tests: "{{ qperf_imix_tests | rejectattr('command', 'in', qperf_available_tests) | list if (qperf_help_tests.rc | default(1)) == 0 else [] }}"

    - name: Run qperf tests against the calling host for each VLAN path
      ansible.builtin.command:
        cmd: >-
          qperf -lp {{ qperf_server_port }}
          {{ item.0.server_ip }}
          {{ item.1.args | replace('{msg_size}', item.2) }}
      loop: "{{ qperf_paths | product(qperf_supported_tests, hostvars['localhost'].cheaplantest_imix_msg_sizes) | list }}"
      register: qperf_cmd
      throttle: 1
      changed_when: false
      failed_when: false

    - name: Build per-client qperf results
      ansible.builtin.set_fact:
        qperf_client_results: >-
          {%- set results = [] -%}
          {%- for result in (qperf_cmd.results | default([])) -%}
          {%- set _ = results.append({
            "target": inventory_hostname,
            "address": ansible_host | default(""),
            "role": qperf_role | default("qperf-client"),
            "vlan": result.item.0.vlan,
            "client_ip": result.item.0.client_ip,
            "server_ip": result.item.0.server_ip,
            "test": result.item.1.name,
            "msg_size": result.item.2,
            "args": result.item.1.args,
            "description": result.item.1.description,
            "rc": result.rc,
            "stdout": result.stdout,
            "stderr": result.stderr,
            "start": result.start,
            "end": result.end,
            "delta": result.delta
          }) -%}
          {%- endfor -%}
          {%- for skipped in (qperf_skipped_tests | default([])) -%}
          {%- set _ = results.append({
            "target": inventory_hostname,
            "address": ansible_host | default(""),
            "role": qperf_role | default("qperf-client"),
            "vlan": "n/a",
            "client_ip": ansible_host | default(""),
            "server_ip": hostvars['localhost'].cheaplantest_server_ip | default(""),
            "test": skipped.name,
            "msg_size": "n/a",
            "args": skipped.args,
            "description": skipped.description,
            "rc": 127,
            "stdout": "",
            "stderr": "Skipped: qperf test not supported by client binary",
            "start": "",
            "end": "",
            "delta": ""
          }) -%}
          {%- endfor -%}
          {{ results }}

- name: Stop qperf server and persist results (EANTC)
  hosts: localhost
  gather_facts: false
  become: true
  become_user: "{{ run_as_user }}"
  vars:
    run_as_user: risng
    user_home: "/home/{{ run_as_user }}"
    qperf_workspace: "{{ user_home }}/cheaplantest_eantc"
    qperf_imix_file: "{{ playbook_dir }}/qperf_imix_eantc.yml"
    qperf_run_id: "{{ hostvars['localhost'].cheaplantest_run_id }}"
    qperf_result_path: "{{ hostvars['localhost'].cheaplantest_result_path }}"
    qperf_server_pid_file: "{{ hostvars['localhost'].cheaplantest_server_pid_file }}"
    qperf_server_log: "{{ hostvars['localhost'].cheaplantest_server_log }}"
    qperf_server_port: "{{ hostvars['localhost'].cheaplantest_server_port }}"
    qperf_imix_profile: "{{ hostvars['localhost'].cheaplantest_imix_profile }}"
    qperf_server_ip: "{{ hostvars['localhost'].cheaplantest_server_ip }}"
    qperf_server_vlan_ips: "{{ hostvars['localhost'].cheaplantest_server_vlan_ips }}"
    qperf_report_script: "{{ playbook_dir }}/files/cheaplantest_report_eantc.py"
    qperf_pdf_path: "{{ qperf_result_path | regex_replace('\\.json$', '.pdf') }}"
    # (PNG embedding disabled; mix is rendered as text in the report)
  tasks:
    - name: Load qperf test definitions (EANTC)
      ansible.builtin.include_vars:
        file: "{{ qperf_imix_file }}"

    - name: Stop qperf server
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -f "{{ qperf_server_pid_file }}" ]; then
          kill "$(cat "{{ qperf_server_pid_file }}")" || true
          rm -f "{{ qperf_server_pid_file }}"
        fi
        ps -eo pid=,args= | awk '$2=="qperf" && $3=="-lp" && $4=="{{ qperf_server_port }}" {print $1}' | while read -r pid; do
          [ -n "$pid" ] && kill "$pid" >/dev/null 2>&1 || true
        done
      args:
        executable: /bin/bash
      changed_when: true

    - name: Collect qperf results from remote clients
      ansible.builtin.set_fact:
        qperf_results: >-
          {{ (groups['qperf_clients_ready'] | default([]) |
             map('extract', hostvars, 'qperf_client_results') |
             select('defined') | list | flatten) +
             (hostvars['localhost'].qperf_unreachable_results | default([])) }}

    - name: Write qperf results to JSON
      ansible.builtin.copy:
        dest: "{{ qperf_result_path }}"
        mode: "0644"
        owner: "{{ run_as_user }}"
        group: "{{ run_as_user }}"
        content: "{{ {\n          'report_banner': 'risng - Cloud Host Endpoint Analysis Probe',\n          'run_id': qperf_run_id,\n          'generated_at': qperf_run_id,\n          'server_ip': qperf_server_ip,\n          'server_vlan_ips': qperf_server_vlan_ips,\n          'server_port': qperf_server_port,\n          'server_log': qperf_server_log,\n          'imix_profile': qperf_imix_profile,\n          'note': 'EANTC traffic mix enabled',\n          'results': qperf_results | default([])\n        } | to_nice_json }}"

    - name: Render cheaplantest_eantc HTML/PDF report
      ansible.builtin.command:
        cmd: >-
          python3 {{ qperf_report_script }}
          {{ qperf_result_path }}
          {{ qperf_pdf_path }}
      register: cheaplantest_report
      changed_when: false
      failed_when: cheaplantest_report.rc != 0

    - name: Show qperf results location
      ansible.builtin.debug:
        msg:
          - "cheaplantest_eantc results written to {{ qperf_result_path }}"
          - "cheaplantest_eantc report written to {{ qperf_pdf_path | regex_replace('\\.pdf$', '.html') }}"
          - "cheaplantest_eantc report written to {{ qperf_pdf_path }}"
