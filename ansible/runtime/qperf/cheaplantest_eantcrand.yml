---
# EANTCRAND variant of cheaplantest.
# Per host: run for ~60s, using quota deck shuffle to randomize msg_size order.
# Output is cumulative only (no long per-msg_size sections).

- name: Start cheaplantest_eantcrand qperf server and prepare targets
  hosts: localhost
  gather_facts: true
  become: true
  become_user: "{{ run_as_user }}"
  vars:
    run_as_user: risng
    user_home: "/home/{{ run_as_user }}"
    qperf_workspace: "{{ user_home }}/cheaplantest_eantcrand"
    qperf_targets_file: "{{ playbook_dir }}/qperf_targets.yml"
    qperf_imix_file: "{{ playbook_dir }}/qperf_imix_eantc.yml"
    qperf_run_id: "{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}"
    qperf_result_path: "{{ qperf_workspace }}/{{ qperf_run_id }}-testrun.json"
    qperf_result_pdf: "{{ qperf_workspace }}/{{ qperf_run_id }}-testrun.pdf"
    qperf_server_port: 19779
    qperf_server_pid_file: "{{ qperf_workspace }}/qperf-server.pid"
    qperf_server_log: "{{ qperf_workspace }}/qperf-server.log"
    qperf_server_ip: "10.228.229.7"

    per_host_duration_sec: "{{ lookup('env', 'CHEAPLANTEST_EANTCRAND_DURATION') | default('60', true) }}"
    deck_scale: "{{ lookup('env', 'CHEAPLANTEST_EANTCRAND_DECK_SCALE') | default('50', true) }}"

  tasks:
    - name: Ensure cheaplantest_eantcrand workspace exists
      ansible.builtin.file:
        path: "{{ qperf_workspace }}"
        state: directory
        mode: "0755"
        owner: "{{ run_as_user }}"
        group: "{{ run_as_user }}"

    - name: Load qperf target definitions
      ansible.builtin.include_vars:
        file: "{{ qperf_targets_file }}"

    - name: Load qperf test definitions (EANTC)
      ansible.builtin.include_vars:
        file: "{{ qperf_imix_file }}"

    - name: Ensure no stale qperf server process is running
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -f "{{ qperf_server_pid_file }}" ]; then
          kill "$(cat "{{ qperf_server_pid_file }}")" >/dev/null 2>&1 || true
          rm -f "{{ qperf_server_pid_file }}"
        fi
        ps -eo pid=,args= | awk '$2=="qperf" && $3=="-lp" && $4=="{{ qperf_server_port }}" {print $1}' | while read -r pid; do
          [ -n "$pid" ] && kill "$pid" >/dev/null 2>&1 || true
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Start qperf server in background (EANTCRAND)
      ansible.builtin.shell: |
        set -euo pipefail
        qperf -lp {{ qperf_server_port }} > "{{ qperf_server_log }}" 2>&1 &
        echo $! > "{{ qperf_server_pid_file }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for qperf server port
      ansible.builtin.wait_for:
        host: "{{ qperf_server_ip }}"
        port: "{{ qperf_server_port }}"
        delay: 1
        timeout: 20

    - name: Normalize qperf targets
      ansible.builtin.set_fact:
        qperf_targets_normalized: >-
          {%- set targets = [] -%}
          {%- for host in qperf_targets -%}
          {%- set _ = targets.append(host) -%}
          {%- endfor -%}
          {{ targets }}

    - name: Register qperf targets for remote execution
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: qperf_clients
        ansible_host: "{{ item.ip }}"
        ansible_user: "{{ item.ssh_user | default('root') }}"
        ansible_python_interpreter: auto_silent
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      loop: "{{ qperf_targets_normalized }}"

    - name: Publish run metadata
      ansible.builtin.set_fact:
        cheaplantest_run_id: "{{ qperf_run_id }}"
        cheaplantest_workspace: "{{ qperf_workspace }}"
        cheaplantest_result_path: "{{ qperf_result_path }}"
        cheaplantest_result_pdf: "{{ qperf_result_pdf }}"
        cheaplantest_server_port: "{{ qperf_server_port }}"
        cheaplantest_server_ip: "{{ qperf_server_ip }}"
        cheaplantest_imix_profile: "{{ qperf_imix_profile }}"
        cheaplantest_imix_msg_sizes: "{{ qperf_imix_profile.msg_sizes | default([]) }}"
        cheaplantest_duration_sec: "{{ per_host_duration_sec }}"
        cheaplantest_deck_scale: "{{ deck_scale }}"

- name: Run cheaplantest_eantcrand on clients (serial per host)
  hosts: qperf_clients
  serial: 1
  gather_facts: false
  become: true
  become_user: root
  vars:
    server_ip: "{{ hostvars['localhost'].cheaplantest_server_ip }}"
    server_port: "{{ hostvars['localhost'].cheaplantest_server_port }}"
    msg_sizes: "{{ hostvars['localhost'].cheaplantest_imix_msg_sizes }}"
    duration_sec: "{{ hostvars['localhost'].cheaplantest_duration_sec }}"
    deck_scale: "{{ hostvars['localhost'].cheaplantest_deck_scale }}"
    run_id: "{{ hostvars['localhost'].cheaplantest_run_id }}"
  tasks:
    - name: Execute randomized quota-deck qperf sampling for ~1 minute on this host
      ansible.builtin.shell: |
        set -euo pipefail
        python3 - <<'PY'
        import json, os, random, re, subprocess, time

        server_ip = os.environ['SERVER_IP']
        server_port = int(os.environ['SERVER_PORT'])
        duration_sec = int(os.environ['DURATION_SEC'])
        deck_scale = int(os.environ['DECK_SCALE'])
        run_id = os.environ['RUN_ID']
        host = os.environ.get('HOST_LABEL') or os.environ.get('HOSTNAME','') or ''

        msg_sizes = json.loads(os.environ['MSG_SIZES_JSON'])

        def parse_weight(ms: str) -> int:
            m = re.search(r"\*(\d+)", ms)
            return int(m.group(1)) if m else 0

        # Build scaled quota deck
        deck = []
        scaled_weights = {}
        for ms in msg_sizes:
            w = parse_weight(ms)
            n = max(1, int(round(w / max(deck_scale, 1))))
            scaled_weights[ms] = n
            deck.extend([ms] * n)

        seed = int(re.sub(r"\D", "", run_id)[-9:] or "1")
        rng = random.Random(seed)

        # stats collectors
        def metric_from_stdout(out: str):
            # find first number + unit
            m = re.search(r"([0-9]+(?:\.[0-9]+)?)\s*([A-Za-z/]+)", out)
            if not m:
                return None
            return float(m.group(1)), m.group(2)

        def to_bytes_per_s(val: float, unit: str):
            u = unit.strip()
            m = re.search(r"^([kKmMgGtT]?)([bB])", u)
            if not m:
                return None
            prefix = (m.group(1) or "").upper()
            b_or_B = m.group(2)
            factor = {"":1.0,"K":1e3,"M":1e6,"G":1e9,"T":1e12}.get(prefix,1.0)
            if b_or_B == 'B':
                return val * factor
            return (val * factor) / 8.0

        def lat_to_usec(val: float, unit: str):
            ul = unit.lower()
            if ul in ('us','usec'):
                return val
            if ul in ('ms','msec'):
                return val * 1000.0
            if ul in ('s','sec'):
                return val * 1_000_000.0
            return None

        agg = {
            'tcp_bw_bytes_per_s': [],
            'udp_bw_bytes_per_s': [],
            'tcp_lat_usec': [],
            'udp_lat_usec': [],
        }
        obs = {ms:0 for ms in msg_sizes}

        tests = [
            ('tcp_bw','tcp_bw_bytes_per_s', to_bytes_per_s),
            ('udp_bw','udp_bw_bytes_per_s', to_bytes_per_s),
            ('tcp_lat','tcp_lat_usec', lat_to_usec),
            ('udp_lat','udp_lat_usec', lat_to_usec),
        ]
        test_idx = 0

        end = time.time() + duration_sec
        while time.time() < end:
            if not deck:
                # rebuild and reshuffle
                deck = []
                for ms, n in scaled_weights.items():
                    deck.extend([ms] * n)
            rng.shuffle(deck)
            ms = deck.pop()
            obs[ms] = obs.get(ms,0) + 1

            test, key, conv = tests[test_idx]
            test_idx = (test_idx + 1) % len(tests)

            cmd = ['qperf','-lp',str(server_port), server_ip, test, '-oo', f'msg_size:{ms}']
            try:
                out = subprocess.check_output(cmd, stderr=subprocess.STDOUT, timeout=15).decode('utf-8','ignore')
            except Exception as e:
                continue
            mu = metric_from_stdout(out)
            if not mu:
                continue
            val, unit = mu
            base = conv(val, unit)
            if base is None:
                continue
            agg[key].append(base)

        def mean(xs):
            return (sum(xs)/len(xs)) if xs else None

        res = {
            'host': host,
            'seed': seed,
            'duration_sec': duration_sec,
            'deck_scale': deck_scale,
            'scaled_quota': scaled_weights,
            'observed_count': obs,
            'means': {
                'tcp_bw_bytes_per_s': mean(agg['tcp_bw_bytes_per_s']),
                'udp_bw_bytes_per_s': mean(agg['udp_bw_bytes_per_s']),
                'tcp_lat_usec': mean(agg['tcp_lat_usec']),
                'udp_lat_usec': mean(agg['udp_lat_usec']),
            },
            'samples': {k: len(v) for k,v in agg.items()},
        }
        print(json.dumps(res))
        PY
      args:
        executable: /bin/bash
      environment:
        HOST_LABEL: "{{ inventory_hostname }}"
        SERVER_IP: "{{ server_ip }}"
        SERVER_PORT: "{{ server_port }}"
        DURATION_SEC: "{{ duration_sec }}"
        DECK_SCALE: "{{ deck_scale }}"
        RUN_ID: "{{ run_id }}"
        MSG_SIZES_JSON: "{{ msg_sizes | to_json }}"
      register: eantcrand_run
      changed_when: false
      failed_when: false

    - name: Store per-host eantcrand result in hostvars
      ansible.builtin.set_fact:
        cheaplantest_eantcrand_host_result: "{{ (eantcrand_run.stdout | from_json) if (eantcrand_run.stdout | length > 0) else {} }}"

- name: Aggregate results and render report (EANTCRAND)
  hosts: localhost
  gather_facts: false
  become: true
  become_user: risng
  vars:
    run_id: "{{ hostvars['localhost'].cheaplantest_run_id }}"
    out_json: "{{ hostvars['localhost'].cheaplantest_result_path }}"
    out_pdf: "{{ hostvars['localhost'].cheaplantest_result_pdf }}"
    report_script: "{{ playbook_dir }}/files/cheaplantest_report_eantcrand.py"
  tasks:
    - name: Collect host results
      ansible.builtin.set_fact:
        host_results: >-
          {{
            (groups['qperf_clients'] | default([]))
            | map('extract', hostvars)
            | map(attribute='cheaplantest_eantcrand_host_result')
            | select('defined')
            | list
          }}

    - name: Build aggregate payload
      ansible.builtin.set_fact:
        payload:
          report_banner: "risng - Cloud Host Endpoint Analysis Probe"
          run_id: "{{ run_id }}"
          generated_at: "{{ run_id }}"
          note: "EANTC traffic mix enabled (quota deck shuffle per host)"
          server_ip: "{{ hostvars['localhost'].cheaplantest_server_ip }}"
          server_port: "{{ hostvars['localhost'].cheaplantest_server_port }}"
          legend:
            duration_sec: "{{ hostvars['localhost'].cheaplantest_duration_sec }}"
            deck_scale: "{{ hostvars['localhost'].cheaplantest_deck_scale }}"
            seed: "derived-from-run_id"
          hosts: "{{ host_results }}"

    - name: Write aggregate JSON
      ansible.builtin.copy:
        dest: "{{ out_json }}"
        mode: "0644"
        content: "{{ payload | to_nice_json }}"

    - name: Render PDF/HTML report
      ansible.builtin.command:
        cmd: "python3 {{ report_script }} {{ out_json }} {{ out_pdf }}"
      changed_when: false

    - name: Stop qperf server
      ansible.builtin.shell: |
        set -euo pipefail
        pid_file="{{ hostvars['localhost'].cheaplantest_workspace }}/qperf-server.pid"
        if [ -f "$pid_file" ]; then
          kill "$(cat "$pid_file")" >/dev/null 2>&1 || true
          rm -f "$pid_file"
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Show report locations
      ansible.builtin.debug:
        msg:
          - "cheaplantest_eantcrand JSON: {{ out_json }}"
          - "cheaplantest_eantcrand HTML: {{ out_pdf | regex_replace('\\.pdf$', '.html') }}"
          - "cheaplantest_eantcrand PDF:  {{ out_pdf }}"
