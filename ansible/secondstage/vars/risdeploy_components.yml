---
risdeploy_ssh_user: root
risdeploy_ssh_password: risng
risdeploy_repo_host: 10.228.229.7
risdeploy_default_components:
  - graphics-gnome

# Reuse the same local repo paths exported by RISng.
risng_repo_centos_updates_path: "7.8.2003/updates/x86_64"
risng_repo_centos_extras_path: "7.8.2003/extras/x86_64"

risdeploy_component_catalog:
  graphics-gnome:
    description: Install local graphical CentOS 7 desktop stack from RISng only.
    yum_groups:
      - "GNOME Desktop"
    packages:
      - gdm
      - gnome-terminal
      - xorg-x11-xauth
      - dbus-x11
    services:
      - gdm
