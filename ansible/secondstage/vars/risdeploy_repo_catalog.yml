---
# Catalog of locally provided package sets for RISng second-stage deployments.
# Purpose: keep package origin and intended use transparent and later renderable.

risdeploy_repo_sets:
  centos7-base:
    source: "CentOS Vault 7.8.2003 os/x86_64"
    source_url: "https://vault.centos.org/7.8.2003/os/x86_64/"
    local_path: "{{ spec_repo_root }}"
    purpose: "Base operating system packages required for all installed CentOS 7.8 clients."
    mode: "iso-sync"

  centos7-updates:
    source: "CentOS Vault 7.8.2003 updates/x86_64"
    source_url: "https://vault.centos.org/7.8.2003/updates/x86_64/"
    local_path: "{{ pxe_tftp_dir }}/kickstart/repos/{{ risng_repo_centos_updates_path }}"
    purpose: "Security, bugfix and post-install update packages for SecondStage deployments."
    mode: "http-mirror"

  centos7-extras:
    source: "CentOS Vault 7.8.2003 extras/x86_64"
    source_url: "https://vault.centos.org/7.8.2003/extras/x86_64/"
    local_path: "{{ pxe_tftp_dir }}/kickstart/repos/{{ risng_repo_centos_extras_path }}"
    purpose: "Additional platform packages required by selected SecondStage components."
    mode: "http-mirror"

  epel7:
    source: "EPEL 7 x86_64"
    source_url: "https://dl.fedoraproject.org/pub/epel/7/x86_64/"
    local_path: "{{ pxe_tftp_dir }}/kickstart/repos/epel/7/x86_64"
    purpose: "Additional community packages for SecondStage features such as NTFS tooling."
    mode: "http-mirror"

risdeploy_component_catalog:
  graphics-gnome:
    description: "Install local graphical CentOS 7 desktop stack from RISng only."
    purpose: "Provide graphical login and GNOME desktop on already installed CentOS 7.8 clients."
    required_repo_sets:
      - centos7-base
      - centos7-updates
      - centos7-extras
    packages:
      - gdm
      - gnome-shell
      - gnome-session
      - gnome-session-xsession
      - gnome-terminal
      - accountsservice
      - xorg-x11-server-Xorg
      - xorg-x11-server-utils
      - xorg-x11-xauth
      - xorg-x11-drivers
      - xorg-x11-drv-libinput
      - xorg-x11-drv-evdev
      - xorg-x11-drv-vesa
      - xorg-x11-drv-fbdev
      - mesa-dri-drivers
      - mesa-libGL
      - mesa-libEGL
      - dbus-x11
    services:
      - gdm

  common-linux-monitoring-base:
    description: "Install Common-Linux monitoring and diagnostics baseline packages from RISng local repos."
    purpose: "Covers RIS-REQ-0021/0023/0024/0026/0029 package baseline on staged CentOS clients."
    required_repo_sets:
      - centos7-base
      - centos7-updates
      - centos7-extras
    packages:
      - net-snmp
      - net-snmp-agent-libs
      - net-snmp-libs
      - net-snmp-utils
      - collectl
      - tk
      - wireshark
      - wireshark-gnome
      - perl-XML-Parser
      - perl-XML-Twig
      - perl-IO-Compress
    services: []
