---
- name: Build RISng second-stage target inventory from DHCP definitions
  hosts: bootstrapvm
  connection: local
  gather_facts: false
  vars_files:
    - ../bootstrapvm/roles/dhcp/defaults/main.yml
    - vars/risdeploy_components.yml
  vars:
    risdeploy_extra_targets_file: /etc/risng/secondstage_targets.json
    risdeploy_target_mac: "{{ risdeploy_target_mac | default('') }}"
  tasks:
    - name: Select enabled RIS deploy targets
      ansible.builtin.set_fact:
        risdeploy_targets: >-
          {{
            (dhcp_static_hosts | default([]))
            | selectattr('secondstage_enabled', 'defined')
            | selectattr('secondstage_enabled')
            | list
          }}

    - name: Load extra secondstage targets file if present
      ansible.builtin.slurp:
        src: "{{ risdeploy_extra_targets_file }}"
      register: risdeploy_extra_targets_raw
      failed_when: false
      changed_when: false

    - name: Parse extra secondstage targets
      ansible.builtin.set_fact:
        risdeploy_extra_targets: >-
          {{
            (risdeploy_extra_targets_raw.content | b64decode | from_json)
            if (risdeploy_extra_targets_raw is defined and risdeploy_extra_targets_raw.content is defined)
            else {}
          }}

    - name: Load management state file if present
      ansible.builtin.slurp:
        src: /var/lib/tftpboot/runtime/management_state.json
      register: risdeploy_management_state_raw
      failed_when: false
      changed_when: false

    - name: Parse management state JSON
      ansible.builtin.set_fact:
        risdeploy_management_state: >-
          {{
            (risdeploy_management_state_raw.content | b64decode | from_json)
            if (risdeploy_management_state_raw is defined and risdeploy_management_state_raw.content is defined)
            else {}
          }}

    - name: Merge DHCP targets with extra secondstage targets
      ansible.builtin.set_fact:
        risdeploy_targets: >-
          {{
            (risdeploy_targets | default([]))
            + (
                (risdeploy_extra_targets | default({})).values()
                | selectattr('secondstage_enabled', 'defined')
                | selectattr('secondstage_enabled')
                | list
              )
          }}

    - name: Apply runtime IP from management state where available
      ansible.builtin.set_fact:
        risdeploy_targets: "{{ updated_targets }}"
      vars:
        updated_targets: >-
          {%- set out = [] -%}
          {%- for item in (risdeploy_targets | default([])) -%}
          {%- set mgmt = (risdeploy_management_state | default({})).get(item.mac, {}) if item.mac is defined else {} -%}
          {%- set _ = out.append(item | combine({'runtime_ip': mgmt.get('runtime_ip'), 'management_ip': mgmt.get('runtime_ip')})) -%}
          {%- endfor -%}
          {{ out }}

    - name: Optionally restrict RIS deploy to a single target MAC
      ansible.builtin.set_fact:
        risdeploy_targets: >-
          {{
            (risdeploy_targets | default([]))
            | selectattr('mac', 'defined')
            | selectattr('mac', 'equalto', risdeploy_target_mac)
            | list
          }}
      when: (risdeploy_target_mac | default('') | length) > 0

    - name: Remove stale SSH host keys for RIS deploy targets on control host
      ansible.builtin.shell: |
        KNOWN="$HOME/.ssh/known_hosts"
        [ -f "$KNOWN" ] || exit 0
        for h in "{{ item.runtime_ip | default(item.management_ip | default(item.ip)) }}" "[{{ item.runtime_ip | default(item.management_ip | default(item.ip)) }}]:22" "{{ item.name }}" "[{{ item.name }}]:22"; do
          ssh-keygen -f "$KNOWN" -R "$h" >/dev/null 2>&1 || true
        done
      args:
        executable: /bin/bash
      loop: "{{ risdeploy_targets }}"
      changed_when: false

    - name: Collect SSH host key via target IP (best effort)
      ansible.builtin.shell: "ssh-keyscan -T 5 -t ed25519,rsa {{ item.runtime_ip | default(item.management_ip | default(item.ip)) }} 2>/dev/null | grep -v '^#' | head -n 1"
      args:
        executable: /bin/bash
      loop: "{{ risdeploy_targets }}"
      register: risdeploy_known_host_ip_scan
      changed_when: false
      failed_when: false

    - name: Register target IP host key in known_hosts
      ansible.builtin.known_hosts:
        path: "{{ lookup('ansible.builtin.env','HOME') }}/.ssh/known_hosts"
        name: "{{ item.item.runtime_ip | default(item.item.management_ip | default(item.item.ip)) }}"
        key: "{{ item.stdout }}"
        state: present
      loop: "{{ risdeploy_known_host_ip_scan.results | default([]) }}"
      when: (item.stdout | default('') | trim) | length > 0
      failed_when: false

    - name: Collect SSH host key via target hostname (best effort)
      ansible.builtin.shell: "ssh-keyscan -T 5 -t ed25519,rsa {{ item.name }} 2>/dev/null | grep -v '^#' | head -n 1"
      args:
        executable: /bin/bash
      loop: "{{ risdeploy_targets }}"
      register: risdeploy_known_host_name_scan
      changed_when: false
      failed_when: false

    - name: Register target hostname key in known_hosts
      ansible.builtin.known_hosts:
        path: "{{ lookup('ansible.builtin.env','HOME') }}/.ssh/known_hosts"
        name: "{{ item.item.name }}"
        key: "{{ item.stdout }}"
        state: present
      loop: "{{ risdeploy_known_host_name_scan.results | default([]) }}"
      when: (item.stdout | default('') | trim) | length > 0
      failed_when: false

    - name: Register enabled RIS deploy targets as dynamic hosts
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: risdeploy_targets
        ansible_host: "{{ item.runtime_ip | default(item.management_ip | default(item.ip)) }}"
        ansible_user: "{{ risdeploy_ssh_user }}"
        ansible_password: "{{ risdeploy_ssh_password }}"
        ansible_become: true
        ansible_become_password: "{{ risdeploy_ssh_password }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        risdeploy_components: "{{ item.secondstage_components | default(risdeploy_default_components) }}"
        risdeploy_role: "{{ item.boot_profile | default('unknown') }}"
        risdeploy_login_user: "{{ item.login_user | default(item.user | default(risdeploy_default_login_user)) }}"
      loop: "{{ risdeploy_targets }}"

- name: Apply RISng second-stage components to selected clients
  hosts: risdeploy_targets
  gather_facts: false
  vars_files:
    - vars/risdeploy_components.yml
    - vars/risdeploy_repo_catalog.yml
  pre_tasks:
    - name: Bootstrap local RISng repositories on second-stage client without Python
      ansible.builtin.raw: |
        mkdir -p /etc/yum.repos.d/disabled /etc/yum.repos.d/bootstrap-only
        for f in /etc/yum.repos.d/*.repo; do
          [ -e "$f" ] || continue
          mv -f "$f" /etc/yum.repos.d/disabled/ 2>/dev/null || true
        done
        cat > /etc/yum.repos.d/risng-secondstage.repo <<'EOF'
        [risng-ss-base]
        name=RISng CentOS 7.8 Base
        baseurl=http://{{ risdeploy_repo_host }}/centos/7/os/x86_64/
        enabled=1
        gpgcheck=0

        [risng-ss-updates]
        name=RISng CentOS 7.8 Updates
        baseurl=http://{{ risdeploy_repo_host }}/kickstart/repos/{{ risng_repo_centos_updates_path }}
        enabled=1
        gpgcheck=0
        skip_if_unavailable=1

        [risng-ss-extras]
        name=RISng CentOS 7.8 Extras
        baseurl=http://{{ risdeploy_repo_host }}/kickstart/repos/{{ risng_repo_centos_extras_path }}
        enabled=1
        gpgcheck=0
        skip_if_unavailable=1

        [risng-ss-epel]
        name=RISng EPEL 7
        baseurl=http://{{ risdeploy_repo_host }}/kickstart/repos/epel/7/x86_64/
        enabled=1
        gpgcheck=0
        skip_if_unavailable=1
        EOF
        cat > /etc/yum.repos.d/bootstrap-only/risng-bootstrap.repo <<'EOF'
        [risng-bootstrap-base]
        name=RISng Bootstrap Base
        baseurl=http://{{ risdeploy_repo_host }}/centos/7/os/x86_64/
        enabled=1
        gpgcheck=0
        EOF
        yum clean all >/dev/null 2>&1 || true
      changed_when: false

    - name: Bootstrap Python 3 for optional later use
      ansible.builtin.raw: >-
        yum --setopt=reposdir=/etc/yum.repos.d/bootstrap-only --disablerepo='*'
        --enablerepo=risng-bootstrap-base
        -y install python3 libselinux-python
      changed_when: false
      failed_when: false

    - name: Build effective component definitions on control host
      ansible.builtin.set_fact:
        risdeploy_component_defs: >-
          {{
            (risdeploy_components | default([]))
            | map('extract', risdeploy_component_catalog)
            | select('defined')
            | list
          }}
      delegate_to: localhost
      delegate_facts: true

  tasks:
    - name: Clean yum metadata before second-stage install
      ansible.builtin.raw: yum clean all >/dev/null 2>&1 || true
      changed_when: false

    - name: Install yum groups required by selected components via raw yum
      ansible.builtin.raw: >-
        yum -y groupinstall {{ hostvars['localhost']['risdeploy_component_defs']
          | map(attribute='yum_groups')
          | flatten
          | unique
          | map('quote')
          | join(' ') }}
      when: (hostvars['localhost']['risdeploy_component_defs'] | map(attribute='yum_groups') | flatten | unique | list | length) > 0
      changed_when: false
      failed_when: false

    - name: Install RPM packages required by selected components via raw yum
      ansible.builtin.raw: >-
        yum -y install {{ hostvars['localhost']['risdeploy_component_defs']
          | map(attribute='yum_packages')
          | flatten
          | unique
          | map('quote')
          | join(' ') }}
      when: (hostvars['localhost']['risdeploy_component_defs'] | map(attribute='yum_packages') | flatten | unique | list | length) > 0
      changed_when: false
      failed_when: false

    - name: Force GDM to use Xorg on graphical clients
      ansible.builtin.raw: |
        mkdir -p /etc/gdm
        python3 - <<'PY'
from pathlib import Path
path = Path('/etc/gdm/custom.conf')
text = path.read_text() if path.exists() else '[daemon]\n'
if '[daemon]' not in text:
    text = '[daemon]\n' + text
if 'WaylandEnable=' in text:
    import re
    text = re.sub(r'^\s*WaylandEnable\s*=.*$', 'WaylandEnable=false', text, flags=re.M)
else:
    text = text.rstrip() + '\nWaylandEnable=false\n'
path.write_text(text)
PY
      when: "'graphics-gnome' in risdeploy_components"
      changed_when: false

    - name: Ensure login user home and authority files exist for graphical session
      ansible.builtin.raw: |
        user_home=$(getent passwd {{ risdeploy_login_user }} | cut -d: -f6)
        mkdir -p "$user_home/.config/dconf" "$user_home/.local/share/backgrounds"
        touch "$user_home/.Xauthority"
        chown -R {{ risdeploy_login_user }}:{{ risdeploy_login_user }} "$user_home/.config" "$user_home/.local" "$user_home/.Xauthority"
      when: "'graphics-gnome' in risdeploy_components"
      changed_when: false

    - name: Regenerate machine identity for freshly staged client
      ansible.builtin.raw: |
        dbus-uuidgen --ensure
        if command -v systemd-machine-id-setup >/dev/null 2>&1; then
          systemd-machine-id-setup >/dev/null 2>&1 || true
        fi
      when: "'graphics-gnome' in risdeploy_components"
      changed_when: false

    - name: Enforce sane default monospace font via system dconf profile
      ansible.builtin.raw: |
        mkdir -p /etc/dconf/db/local.d /etc/dconf/profile
        cat >/etc/dconf/profile/user <<'EOF'
        user-db:user
        system-db:local
        EOF
        cat >/etc/dconf/db/local.d/00-risng-fonts <<'EOF'
        [org/gnome/desktop/interface]
        monospace-font-name='Monospace 11'
        EOF
        dconf update >/dev/null 2>&1 || true
      when: "'graphics-gnome' in risdeploy_components"
      changed_when: false

    - name: Restart GDM after graphical session fixes
      ansible.builtin.raw: |
        systemctl restart gdm || systemctl restart gdm3 || true
      when: "'graphics-gnome' in risdeploy_components"
      changed_when: false

    - name: Enable and start services required by selected components via systemctl
      ansible.builtin.raw: "systemctl enable --now {{ item }}"
      loop: "{{ hostvars['localhost']['risdeploy_component_defs'] | map(attribute='services') | flatten | unique | list }}"
      when: (hostvars['localhost']['risdeploy_component_defs'] | map(attribute='services') | flatten | unique | list | length) > 0
      changed_when: false
      failed_when: false

    - name: Set graphical.target when graphical component is selected
      ansible.builtin.raw: systemctl set-default graphical.target
      when: "'graphics-gnome' in risdeploy_components"
      changed_when: false
