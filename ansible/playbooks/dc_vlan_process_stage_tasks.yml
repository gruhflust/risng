---
- name: Compute stage ID
  ansible.builtin.set_fact:
    stage_id: >-
      {% set candidate = stage_def.id | default('') | trim %}
      {% if candidate | length > 0 %}
      {{ candidate }}
      {% else %}
      {% set default_id = stage_defaults.id | default('') | trim %}
      {% if default_id | length > 0 %}
      {{ default_id }}
      {% else %}
      stage_{{ stage_index }}
      {% endif %}
      {% endif %}

- name: Compute stage title and description
  ansible.builtin.set_fact:
    stage_title: >-
      {% set candidate = stage_def.title | default('') | trim %}
      {% if candidate | length > 0 %}
      {{ candidate }}
      {% else %}
      {% set default_title = stage_defaults.title | default('') | trim %}
      {% if default_title | length > 0 %}
      {{ default_title }}
      {% else %}
      {{ stage_id }}
      {% endif %}
      {% endif %}
    stage_description: >-
      {% set candidate = stage_def.description | default('') | trim %}
      {% if candidate | length > 0 %}
      {{ candidate }}
      {% else %}
      {% set default_description = stage_defaults.description | default('') | trim %}
      {{ default_description }}
      {% endif %}

- name: Determine raw stage endpoint
  ansible.builtin.set_fact:
    stage_endpoint_raw: "{{ (stage_def.endpoint | default(stage_defaults.endpoint | default(''))) | trim }}"

- name: Normalize stage endpoint
  ansible.builtin.set_fact:
    stage_endpoint_clean: "{{ stage_endpoint_raw if stage_endpoint_raw | length > 0 else '' }}"

- name: Build normalized stage endpoint
  ansible.builtin.set_fact:
    stage_endpoint_norm: "{{ stage_endpoint_clean if stage_endpoint_clean | length == 0 or stage_endpoint_clean.startswith('/') else '/' ~ stage_endpoint_clean }}"

- name: Prepare stage query (default and custom filters)
  ansible.builtin.set_fact:
    stage_query_defaults: "{{ stage_defaults.query_defaults | default({}, true) }}"
    stage_query_user: "{{ stage_def.query | default({}, true) }}"

- name: Combine stage query and filter parameters
  ansible.builtin.set_fact:
    stage_query_combined: "{{ (stage_query_defaults if stage_query_defaults is mapping else {})
      | combine(stage_query_user if stage_query_user is mapping else {}, recursive=True) }}"

- name: Expand combined query parameters
  ansible.builtin.set_fact:
    stage_query_items: "{{ stage_query_combined | dict2items }}"

- name: Filter query parameters
  ansible.builtin.set_fact:
    stage_query_filtered: "{{ stage_query_items | selectattr('value', 'defined')
      | rejectattr('value', 'equalto', '')
      | rejectattr('value', 'equalto', None) | list }}"

- name: Build final query parameter map
  ansible.builtin.set_fact:
    stage_query_params: "{{ stage_query_filtered | items2dict }}"

- name: Build query string
  ansible.builtin.set_fact:
    stage_query_string: >-
      {%- set pairs = [] -%}
      {%- for param in stage_query_filtered -%}
      {%-   set _key = param.key -%}
      {%-   set _value = param.value -%}
      {%-   if _value is sequence and (_value is not string) -%}
      {%-     set _value_text = (_value | map('string') | join(',')) -%}
      {%-   elif _value is sameas true -%}
      {%-     set _value_text = 'true' -%}
      {%-   elif _value is sameas false -%}
      {%-     set _value_text = 'false' -%}
      {%-   else -%}
      {%-     set _value_text = _value -%}
      {%-   endif -%}
      {%-   if _value_text is not none and (_value_text | string | length) > 0 -%}
      {%-     set _ = pairs.append(_key ~ '=' ~ (_value_text | string | urlencode)) -%}
      {%-   endif -%}
      {%- endfor -%}
      {{ pairs | join('&') }}

- name: Compute stage URL
  ansible.builtin.set_fact:
    stage_url: "{{ dc_vlan_base_url ~ stage_endpoint_norm }}{{ '?' ~ stage_query_string if stage_query_string | length > 0 else '' }}"

- name: Prepare summary fields
  ansible.builtin.set_fact:
    stage_summary_fields_raw: "{{ stage_def.summary_fields | default(stage_defaults.summary_fields | default(dc_vlan_fallback_summary_fields)) }}"
    stage_summary_fields: "{{ stage_summary_fields_raw if (stage_summary_fields_raw is sequence and stage_summary_fields_raw is not string) else dc_vlan_fallback_summary_fields }}"

- name: Validate stage configuration
  ansible.builtin.fail:
    msg: "[dc-vLAN-test] → Query {{ stage_title }} does not define a valid API endpoint."
  when: stage_endpoint_norm | length == 0

- name: Show NetBox URL
  ansible.builtin.debug:
    msg: "[dc-vLAN-test] → {{ stage_title }}: {{ stage_url }}"

- name: Query NetBox for {{ stage_title }}
  ansible.builtin.uri:
    url: "{{ stage_url }}"
    method: GET
    headers:
      Authorization: "Token {{ netbox_token }}"
      Accept: application/json
    return_content: true
    status_code: 200
    validate_certs: false
  register: stage_response
  failed_when: stage_response.status != 200

- name: Extract NetBox results
  ansible.builtin.set_fact:
    stage_results: "{{ stage_response.json.results | default([]) }}"

- name: Collect stage result filters
  ansible.builtin.set_fact:
    stage_result_filter_map: "{{ ({})
         | combine(stage_defaults.result_filter if (stage_defaults.result_filter is defined and stage_defaults.result_filter is mapping) else {}, recursive=True)
         | combine(stage_def.result_filter if (stage_def.result_filter is defined and stage_def.result_filter is mapping) else {}, recursive=True) }}"

- name: Prepare stage result filter list
  ansible.builtin.set_fact:
    stage_result_filter_items: "{{ stage_result_filter_map | dict2items }}"
  when: stage_result_filter_map | length > 0

- name: Apply result filters
  ansible.builtin.set_fact:
    stage_results: "{{ stage_results | selectattr(filter_item.key, 'match', filter_regex) | list }}"
  loop: "{{ stage_result_filter_items | default([]) }}"
  loop_control:
    loop_var: filter_item
  vars:
    filter_pattern: "{{ filter_item.value | string }}"
    filter_regex: "{{ '(?i)^' ~ (filter_pattern | regex_escape | replace('\\*', '.*') | replace('\\?', '.')) ~ '$' }}"
  when: stage_result_filter_items | default([]) | length > 0

- name: Initialize result presentation
  ansible.builtin.set_fact:
    stage_summary_lines: []
    stage_rows: []

- name: Build summarized result rows
  ansible.builtin.set_fact:
    stage_summary_lines: "{{ stage_summary_lines + [ summary_line ] }}"
    stage_rows: "{{ stage_rows + [ {'summary': summary_line, 'data': item} ] }}"
  loop: "{{ stage_results }}"
  vars:
    summary_line: >-
      {%- set parts = [] -%}
      {%- for field in stage_summary_fields -%}
      {%-   set _path = (field.path if field is mapping else field) | default('') -%}
      {%-   set _label = (field.label if field is mapping else field) | default(_path if _path | length > 0 else 'Value') -%}
      {%-   if _path | length > 0 -%}
      {%-     set _raw = item | json_query(_path) -%}
      {%-   else -%}
      {%-     set _raw = none -%}
      {%-   endif -%}
      {%-   if _raw is mapping -%}
      {%-     set _raw_val = _raw.name | default(_raw.label | default(_raw.id | default(_raw | to_json))) -%}
      {%-   elif _raw is sequence and (_raw is not string) -%}
      {%-     set _raw_val = _raw | map('string') | join(', ') -%}
      {%-   else -%}
      {%-     set _raw_val = _raw -%}
      {%-   endif -%}
      {%-   set _value = (_raw_val if _raw_val not in [none, ''] else 'n/a') -%}
      {%-   set _ = parts.append(_label ~ ': ' ~ (_value | string | trim)) -%}
      {%- endfor -%}
      - {{ parts | join(' | ') if parts | length > 0 else (item | to_json) }}

- name: Show result overview
  ansible.builtin.debug:
    msg: "[dc-vLAN-test] → {{ stage_title }} returned {{ stage_results | length }} entries."

- name: List results
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ stage_summary_lines }}"
  when: stage_results | length > 0

- name: No results for this stage
  ansible.builtin.debug:
    msg: "[dc-vLAN-test] → No matches for {{ stage_title }}."
  when: stage_results | length == 0

- name: Append stage report
  ansible.builtin.set_fact:
    dc_vlan_stage_reports: "{{ dc_vlan_stage_reports + [ {
      'id': stage_id,
      'title': stage_title,
      'description': stage_description,
      'endpoint': stage_endpoint_norm,
      'url': stage_url,
      'query': stage_query_params,
      'result_filter': stage_result_filter_map,
      'result_count': stage_results | length,
      'summary_fields': stage_summary_fields,
      'rows': stage_rows,
      'raw_results': stage_results
    } ] }}"
