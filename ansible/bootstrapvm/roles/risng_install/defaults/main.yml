---
# risng_install role defaults for CentOS 7.8 PXE autoinstall
spec_iso_mount: "{{ pxe_tmp_dir }}/mnt-spec"
spec_target: "{{ pxe_tftp_dir }}/images/spec"
spec_target_relative: "images/spec"
spec_kernel: "vmlinuz"
spec_initrd: "initrd.img"
spec_grub_filename: "10-spec.cfg"
spec_pxelinux_filename: "10-spec.cfg"
spec_label: "CentOS 7.8 AutoInstall (BIOS)"
spec_grub_label: "CentOS 7.8 AutoInstall (UEFI)"

# HTTP-exposed CentOS installer tree (served from pxe_tftp_dir)
spec_repo_relative: "centos/7/os/x86_64"
spec_repo_root: "{{ pxe_tftp_dir }}/{{ spec_repo_relative }}"

# CentOS 7.8 source ISO
centos78_iso_filename: "CentOS-7-x86_64-DVD-2003.iso"
centos78_iso_url: "http://vault.centos.org/7.8.2003/isos/x86_64/{{ centos78_iso_filename }}"
centos78_iso_path: "{{ iso_download_dir }}/centos78.iso"

# If false (default), ISO extract/sync runs only when critical stage2 artifacts are missing.
# If true, force full ISO extract/sync on every feuer run.
spec_repo_rebuild_always: false

# Network args for CentOS stage2 retrieval during autoinstall.
# Tuned for slower/virtualized environments (e.g. cloud labs) where link bring-up
# or DHCP can lag and otherwise trigger dracut/anaconda stage2 timeouts.
spec_install_net_args: >-
  ip=dhcp
  ksdevice=bootif
  BOOTIF=01-${net_default_mac}
  rd.bootif=1
  rd.neednet=1
  rd.net.timeout.carrier=60
  rd.net.timeout.ifup=120
  rd.retry=180
  noipv6

# Optional extra kernel args appended to installer entries.
spec_install_extra_args: ""

# Supported RISng client roles for autoinstall
risng_client_roles:
  - iCWP
  - iFDO
  - iCMD
  - FDPS
  - CORRP
