# roles/spec/tasks/main.yml
# CentOS 7.8 PXE autoinstall + role-specific kickstart profiles

- name: 04 01 Ensure working directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ iso_download_dir }}"
    - "{{ spec_iso_mount }}"
    - "{{ spec_target }}"
    - "{{ spec_repo_root }}"
    - "{{ pxe_tftp_dir }}/kickstart"
    - "{{ pxelinux_dir }}"
    - "{{ grub_dir }}"

- name: 04 01a Download CentOS 7.8 ISO when absent
  ansible.builtin.get_url:
    url: "{{ centos78_iso_url }}"
    dest: "{{ centos78_iso_path }}"
    mode: "0644"
    force: false
    timeout: 1200

- name: 04 02 Reset extracted ISO workspace to avoid stale trees from previous runs
  ansible.builtin.file:
    path: "{{ spec_iso_mount }}"
    state: absent

- name: 04 02a Recreate extracted ISO workspace
  ansible.builtin.file:
    path: "{{ spec_iso_mount }}"
    state: directory
    mode: "0755"

- name: 04 02b Extract CentOS 7.8 ISO (always fresh)
  ansible.builtin.command: >
    bsdtar -C {{ spec_iso_mount }} -xf {{ centos78_iso_path }}

- name: 04 02c Sync extracted CentOS tree into HTTP repo root
  ansible.builtin.command: >
    rsync -a --delete {{ spec_iso_mount }}/ {{ spec_repo_root }}/

- name: 04 02b Ensure lightweight HTTP server unit exists for PXE repo
  ansible.builtin.copy:
    dest: /etc/systemd/system/pxe-http.service
    mode: "0644"
    content: |
      [Unit]
      Description=PXE HTTP file server ({{ pxe_tftp_dir }})
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/python3 -m http.server 80 --directory {{ pxe_tftp_dir }}
      Restart=always
      RestartSec=2

      [Install]
      WantedBy=multi-user.target

- name: 04 02c Enable and start PXE HTTP file server
  ansible.builtin.systemd:
    name: pxe-http
    enabled: true
    state: started
    daemon_reload: true

- name: 04 03 Copy kernel
  ansible.builtin.copy:
    remote_src: true
    src: "{{ spec_iso_mount }}/images/pxeboot/{{ spec_kernel }}"
    dest: "{{ spec_target }}/{{ spec_kernel }}"
    mode: "0644"

- name: 04 04 Copy initrd
  ansible.builtin.copy:
    remote_src: true
    src: "{{ spec_iso_mount }}/images/pxeboot/{{ spec_initrd }}"
    dest: "{{ spec_target }}/{{ spec_initrd }}"
    mode: "0644"

- name: 04 04a Render role-specific kickstart files
  ansible.builtin.template:
    src: kickstart-role.cfg.j2
    dest: "{{ pxe_tftp_dir }}/kickstart/{{ item | lower }}.cfg"
    mode: "0644"
  loop: "{{ risng_client_roles }}"


- name: 04 04b Ensure bootstrap metadata directory exists
  ansible.builtin.file:
    path: "{{ pxe_tftp_dir }}/bootstrap"
    state: directory
    mode: "0755"

- name: 04 04c Publish control-host SSH public key for client bootstrap
  ansible.builtin.copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
    dest: "{{ pxe_tftp_dir }}/bootstrap/controlhost_id_ed25519.pub"
    remote_src: true
    mode: "0644"

- name: 04 05 Deploy PXELINUX entries per RISng role
  ansible.builtin.template:
    src: "{{ pxe_entry_pxelinux_template }}"
    dest: "{{ pxelinux_dir }}/20-{{ item | lower }}.cfg"
    mode: "0644"
  vars:
    filename_prefix: "{{ item | lower }}"
    menu_title: "CentOS 7.8 AutoInstall ({{ item }})"
    kernel_path: "/{{ spec_target_relative }}/{{ spec_kernel }}"
    initrd_path: "/{{ spec_target_relative }}/{{ spec_initrd }}"
    kernel_cmdline: >-
      inst.stage2=http://{{ tftp_server_ip }}/{{ spec_repo_relative }}
      inst.repo=http://{{ tftp_server_ip }}/{{ spec_repo_relative }}
      ks=http://{{ tftp_server_ip }}/kickstart/{{ item | lower }}.cfg
      ip=dhcp
  loop: "{{ risng_client_roles }}"

- name: 04 06 Deploy GRUB entries per RISng role
  ansible.builtin.template:
    src: "{{ pxe_entry_grub_template }}"
    dest: "{{ grub_dir }}/20-{{ item | lower }}.cfg"
    mode: "0644"
  vars:
    filename_prefix: "{{ item | lower }}"
    menu_title: "CentOS 7.8 AutoInstall ({{ item }})"
    kernel_path: "/{{ spec_target_relative }}/{{ spec_kernel }}"
    initrd_path: "/{{ spec_target_relative }}/{{ spec_initrd }}"
    append_args: >-
      inst.stage2=http://{{ tftp_server_ip }}/{{ spec_repo_relative }}
      inst.repo=http://{{ tftp_server_ip }}/{{ spec_repo_relative }}
      ks=http://{{ tftp_server_ip }}/kickstart/{{ item | lower }}.cfg
      ip=dhcp
  loop: "{{ risng_client_roles }}"

- import_tasks: bootloader_generation.yml
