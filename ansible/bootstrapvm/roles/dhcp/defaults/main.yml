# dhcp_defaults_v11

dhcp_interface: "{{ risng_lan_interface }}"
dhcp_subnet: "{{ dhcp_network_prefix }}.0"
dhcp_netmask: "255.255.255.0"
dhcp_prefix: "24"
dhcp_gateway: "{{ bootstrap_ip }}"
dhcp_dns_server: "{{ bootstrap_ip }}"

dhcp_range_start: "{{ dhcp_network_prefix }}.101"
dhcp_range_end:   "{{ dhcp_network_prefix }}.110"

# Boot profile selection.
# - dhcp_default_boot_profile controls the default preselected role for all clients.
# - Per-host overrides via dhcp_static_hosts[].boot_profile are supported.
# - dhcp_static_hosts[].boot_filename still has highest priority.
#
# Keep risng as default unless you explicitly want another role.
dhcp_default_boot_profile: "live-ris"

dhcp_boot_profiles:
  live-ris:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"
  iCWP:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"
  iFDO:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"
  iCMD:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"
  FDPS:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"
  CORRP:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"
  debian-live:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"
  spec:
    uefi: "bootx64.efi"
    bios: "pxelinux.0"

# Menu targets used for per-host preselection/highlighting.
# BIOS labels must match LABEL entries in pxelinux fragments.
# UEFI entries must match GRUB menuentry titles.
dhcp_boot_menu_defaults:
  live-ris:
    bios_label: "live-ris"
    uefi_menuentry: "Live-RIS (UEFI)"
  iCWP:
    bios_label: "icwp"
    uefi_menuentry: "CentOS 7.8 AutoInstall (iCWP)"
  iFDO:
    bios_label: "ifdo"
    uefi_menuentry: "CentOS 7.8 AutoInstall (iFDO)"
  iCMD:
    bios_label: "icmd"
    uefi_menuentry: "CentOS 7.8 AutoInstall (iCMD)"
  FDPS:
    bios_label: "fdps"
    uefi_menuentry: "CentOS 7.8 AutoInstall (FDPS)"
  CORRP:
    bios_label: "corrp"
    uefi_menuentry: "CentOS 7.8 AutoInstall (CORRP)"
  debian-live:
    bios_label: "live-ris"
    uefi_menuentry: "Live-RIS (UEFI)"
  spec:
    bios_label: "icwp"
    uefi_menuentry: "CentOS 7.8 AutoInstall (iCWP)"


