# roles/dns/tasks/main.yml
# Version: dns_v08 – bootstrap_ip fallback, offline-safe

- name: Ensure bootstrap_ip is defined
  ansible.builtin.set_fact:
    bootstrap_ip: "{{ ansible_default_ipv4.address }}"
  when: bootstrap_ip is not defined

- name: "00 Ensure bind9 is installed"
  ansible.builtin.apt:
    name:
      - bind9
      - bind9-utils
    state: present
    update_cache: yes

- name: "01 Ensure directory /etc/bind/zones"
  ansible.builtin.file:
    path: /etc/bind/zones
    state: directory
    owner: bind
    group: bind
    mode: "0755"

- name: "02 Copy named.conf.options"
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    owner: root
    group: bind
    mode: "0644"
  notify: restart dns service

- name: "03 Copy forward zone file"
  ansible.builtin.template:
    src: db.pnt.local.j2
    dest: /etc/bind/zones/db.{{ dns_zone_name }}
    owner: bind
    group: bind
    mode: "0644"
  notify: restart dns service

- name: "04 Copy reverse zone file"
  ansible.builtin.template:
    src: db.100.168.192.rev.j2
    dest: /etc/bind/zones/db.{{ dns_reverse_zone_name }}
    owner: bind
    group: bind
    mode: "0644"
  notify: restart dns service

- name: "05 Copy named.conf.local"
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    owner: root
    group: root
    mode: "0644"
  notify: restart dns service

- name: "06 Validate named.conf syntax"
  ansible.builtin.command: named-checkconf
  changed_when: false

- name: "07 Configure resolv.conf with local nameserver"
  ansible.builtin.lineinfile:
    path: /etc/resolv.conf
    line: "nameserver {{ dns_nameserver }}"
    mode: "0644"
    state: present
    create: true

- name: "08 Ensure override directory for bind9 exists"
  ansible.builtin.file:
    path: /etc/systemd/system/bind9.service.d
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: "09 Deploy interface dependency override"
  ansible.builtin.copy:
    dest: /etc/systemd/system/bind9.service.d/override.conf
    content: |
      [Unit]
      BindsTo=sys-subsystem-net-devices-{{ dns_interface }}.device
      After=sys-subsystem-net-devices-{{ dns_interface }}.device
      Requires=sys-subsystem-net-devices-{{ dns_interface }}.device
    owner: root
    group: root
    mode: "0644"
  notify: daemon reload

- name: "10 Show bind9 status summary"
  ansible.builtin.shell: systemctl status --no-pager bind9 || systemctl status --no-pager named | head -n 15
  register: bind_status
  changed_when: false

- name: "11 Debug bind9 status"
  ansible.builtin.debug:
    msg: "{{ bind_status.stdout_lines }}"

- name: "12 Ensure bind9 service is present (force reinstallation if missing)"
  shell: |
    if ! systemctl list-unit-files | grep -q '^bind9.service'; then
      apt-get install --reinstall -y bind9 bind9-utils
    fi
  args:
    executable: /bin/bash
  register: bind9_reinstall
  changed_when: "'Setting up bind9' in bind9_reinstall.stdout"


- name: "12a Repair interrupted package configuration (best effort)"
  ansible.builtin.command: dpkg --configure -a
  register: dpkg_repair
  changed_when: false
  failed_when: false

- name: "12b Ensure package dependencies are healthy (best effort)"
  ansible.builtin.command: apt-get -f install -y
  register: apt_fix
  changed_when: false
  failed_when: false

- name: "12c Reload service facts"
  ansible.builtin.service_facts:

- name: "12d Select DNS service name"
  ansible.builtin.set_fact:
    dns_service_name: "{{ (dns_service_candidates | select('in', (ansible_facts.services.keys() | list | map('regex_replace', '\\.service$', '') | list)) | list | first) | default('bind9') }}"

- name: "12e Show selected DNS service"
  ansible.builtin.debug:
    msg: "Using DNS service unit: {{ dns_service_name }}"

- name: "13 Ensure DNS service is enabled and started"
  ansible.builtin.systemd:
    name: "{{ dns_service_name }}"
    state: started
    enabled: true
