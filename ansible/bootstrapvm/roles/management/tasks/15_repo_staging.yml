---
# Local repository staging for RISng.
# Keeps package sources on the staging host and publishes them over the PXE LAN.

- name: 15_00 Ensure RISng repository staging directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ risng_repo_root }}"
    - "{{ risng_repo_root }}/scripts"
    - "{{ risng_repo_root }}/sync"
    - "{{ risng_repo_root }}/sync/log"
    - "{{ risng_repo_root }}/kickstart"
    - "{{ pxe_tftp_dir }}/kickstart/repos"
    - "{{ pxe_tftp_dir }}/kickstart/repos/{{ risng_repo_centos_updates_path }}"
    - "{{ pxe_tftp_dir }}/kickstart/repos/{{ risng_repo_centos_extras_path }}"
    - "{{ spec_repo_root }}"

- name: 15_01 Install repository staging prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - rsync
      - wget
      - createrepo-c
      - nginx
    state: present
    update_cache: true

- name: 15_01a Deploy nginx site for RISng PXE and package publishing
  ansible.builtin.template:
    src: risng-pxe-nginx.conf.j2
    dest: /etc/nginx/sites-available/risng-pxe.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: 15_01b Enable RISng PXE nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/risng-pxe.conf
    dest: /etc/nginx/sites-enabled/risng-pxe.conf
    state: link
    force: true
  notify: Reload nginx

- name: 15_01c Disable nginx default site when present
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: 15_01d Stop and disable legacy pxe-http before nginx takes port 80
  ansible.builtin.systemd:
    name: pxe-http
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false

- name: 15_01e Reset failed state of legacy pxe-http before nginx startup
  ansible.builtin.command:
    cmd: systemctl reset-failed pxe-http
  changed_when: false
  failed_when: false

- name: 15_01f Ensure nginx is enabled and started
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started

- name: 15_02 Render RISng repository sync helper
  ansible.builtin.template:
    src: risng-repo-sync.sh.j2
    dest: "{{ risng_repo_root }}/scripts/risng-repo-sync.sh"
    owner: root
    group: root
    mode: "0755"

- name: 15_03 Install systemd service for RISng repo sync
  ansible.builtin.copy:
    dest: /etc/systemd/system/risng-repo-sync.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Synchronise RISng offline repositories
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart={{ risng_repo_root }}/scripts/risng-repo-sync.sh
      WorkingDirectory={{ risng_repo_root }}

      [Install]
      WantedBy=multi-user.target

- name: 15_04 Install systemd timer for RISng repo sync
  ansible.builtin.copy:
    dest: /etc/systemd/system/risng-repo-sync.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Periodic RISng repository synchronisation

      [Timer]
      OnBootSec=10min
      OnUnitActiveSec={{ risng_repo_sync_interval }}
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: 15_05 Reload systemd after RISng repo sync unit deployment
  ansible.builtin.systemd:
    daemon_reload: true

- name: 15_06 Enable RISng repo sync timer
  ansible.builtin.systemd:
    name: risng-repo-sync.timer
    enabled: true
    state: started

- name: 15_07 Render RISng local client repo file
  ansible.builtin.template:
    src: centos7-local.repo.j2
    dest: "{{ pxe_tftp_dir }}/kickstart/centos7-local.repo"
    owner: root
    group: root
    mode: "0644"

- name: 15_08 Optionally run initial repository sync during staging
  ansible.builtin.command:
    cmd: systemctl start risng-repo-sync.service
  register: risng_repo_sync_start
  failed_when: false
  changed_when: risng_repo_sync_start.rc == 0
  when: risng_repo_sync_on_stage | bool

- name: 15_09 Warn when optional initial repository sync failed
  ansible.builtin.debug:
    msg: >-
      Optional initial RISng repository sync failed (rc={{ risng_repo_sync_start.rc }}).
      Continuing with spec_repo_source_mode={{ spec_repo_source_mode }}.
      Check systemctl status risng-repo-sync.service and journalctl -xeu risng-repo-sync.service
      if you want to debug the mirror path.
  when:
    - risng_repo_sync_on_stage | bool
    - risng_repo_sync_start.rc is defined
    - risng_repo_sync_start.rc != 0
