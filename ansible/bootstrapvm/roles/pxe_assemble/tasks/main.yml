# roles/pxe_assemble/tasks/main.yml
# Version: pxe_assemble_v2.4.2 – basename-dedupe, path-safe

- name: Ensure PXE menu directories exist
  ansible.builtin.file:
    path: "{{ pxe_tftp_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "pxelinux.cfg"
    - "boot/grub"

########################################################################
#                           BIOS section                               #
########################################################################

- name: Gather BIOS menu fragments
  ansible.builtin.find:
    paths: "{{ pxe_tftp_dir }}/pxelinux.cfg"
    patterns:
      - '^[0-9]{2}-.*\.cfg$'
    use_regex: true
    file_type: file
  register: _bios_all

- name: Build unique BIOS fragment list  # {basename: fullpath}
  ansible.builtin.set_fact:
    _bios_dict: >-
      {{
        dict(
          (_bios_all.files | sort(attribute='path') | map(attribute='path'))
          |
          zip(_bios_all.files | map(attribute='path') | map('basename'))
          | map('reverse')
        )
      }}

- name: Ensure BIOS fallback fragment exists when list empty
  ansible.builtin.template:
    src: 99-fallback.cfg-bios.j2
    dest: "{{ pxe_tftp_dir }}/pxelinux.cfg/99-fallback.cfg"
    mode: "0644"
  when: _bios_dict | length == 0

- name: Select default LABEL from last fragment
  ansible.builtin.command: >
    awk '/^LABEL/{lbl=$2} END{print lbl}'
    {{ (_bios_dict.values() | list | sort | last) | quote }}
  register: _bios_default
  changed_when: false
  when: _bios_dict | length > 0

- name: Load BIOS fragments as content
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop: "{{ _bios_dict.values() | sort }}"
  register: bios_fragments_raw
  when: _bios_dict | length > 0

- name: Write pxelinux.cfg/default (inline entries)
  ansible.builtin.copy:
    dest: "{{ pxe_tftp_dir }}/pxelinux.cfg/default"
    mode: "0644"
    content: |
      # auto-generated by pxe_assemble v2.5.0 (inline version)
      UI vesamenu.c32
      PROMPT 0
      TIMEOUT {{ pxe_timeout }}
      DEFAULT {{ _bios_default.stdout | default(pxe_default_label) }}
      ONTIMEOUT {{ _bios_default.stdout | default(pxe_default_label) }}
      MENU TITLE PXE Boot Menu (Legacy BIOS)

      {% for frag in bios_fragments_raw.results | default([]) %}
      {{ frag.content | b64decode }}
      {% endfor %}



# ------------------- UEFI section (fixed, inline mode) ------------------------

- name: Gather UEFI menu fragments
  ansible.builtin.find:
    paths: "{{ grub_dir }}"
    patterns: "^[0-9]{2}-.*\\.cfg$"
    use_regex: true
    file_type: file
  register: uefi_fragments

- name: Count total UEFI menuentries
  ansible.builtin.command: >
    sh -c "grep -h '^menuentry' {{ uefi_fragments.files | map(attribute='path') | join(' ') }} | wc -l"
  register: _grub_count
  changed_when: false

- name: Deploy fallback if no valid UEFI entry exists
  ansible.builtin.template:
    src: 99-fallback.cfg.j2
    dest: "{{ grub_dir }}/99-fallback.cfg"
    mode: "0644"
  when: _grub_count.stdout | int == 0

- name: Recount entries after fallback (ensure at least one)
  ansible.builtin.command: >
    sh -c "grep -h '^menuentry' {{ grub_dir }}/*.cfg | wc -l"
  register: _grub_entry_final
  changed_when: false

- name: Load all GRUB fragments as content
  ansible.builtin.slurp:
    src: "{{ item.path }}"
  loop: "{{ uefi_fragments.files | sort(attribute='path') }}"
  register: grub_fragments_raw
  when: uefi_fragments.matched > 0

- name: Write final grub.cfg (inline entries)
  ansible.builtin.copy:
    dest: "{{ grub_dir }}/grub.cfg"
    mode: "0644"
    content: |
      # auto-generated by pxe_assemble v2.5.0 (inline version)
      set default={{ (_grub_entry_final.stdout | int) - 1 if (_grub_entry_final.stdout | int) > 0 else 0 }}
      set timeout={{ (pxe_timeout / 10) | int }}

      {% for frag in grub_fragments_raw.results %}
      {{ frag.content | b64decode }}
      {% endfor %}

