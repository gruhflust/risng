---
# customise_live_root_v03 – robustified version with full feature parity

# 01 Copy resolv.conf from host
- name: 02 05 01 Copy resolv.conf
  ansible.builtin.copy:
    src: /etc/resolv.conf
    dest: "{{ debian_live_workdir }}/etc/resolv.conf"
    remote_src: true
    mode: '0644'

# 02 Enable sshd autostart
- name: 02 05 02 Enable sshd autostart
  ansible.builtin.lineinfile:
    path: "{{ debian_live_workdir }}/root/.bash_profile"
    line: "pgrep -x sshd >/dev/null || /usr/sbin/sshd"
    create: true
    mode: '0644'

# 03a Check if public key is present
- name: 02 05 03a Stat SSH public key
  ansible.builtin.stat:
    path: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
  register: ssh_pubkey

# 03b Copy SSH key if present
- name: 02 05 03b Inject SSH public key
  ansible.builtin.copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
    dest: "{{ debian_live_workdir }}/root/.ssh/authorized_keys"
    mode: '0600'
    remote_src: true
  when: ssh_pubkey.stat.exists

# 03c Warn if key is missing
- name: 02 05 03c Warn if no public key found
  ansible.builtin.debug:
    msg: "WARNING: SSH public key not found – live root will have no remote access!"
  when: not ssh_pubkey.stat.exists

# 04 Create autologin directory
- name: 02 05 04 Create autologin directory
  ansible.builtin.file:
    path: "{{ debian_live_workdir }}/etc/systemd/system/getty@tty1.service.d"
    state: directory
    mode: '0755'

# 05 Deploy systemd autologin override
- name: 02 05 05 Deploy autologin override
  ansible.builtin.copy:
    dest: "{{ debian_live_workdir }}/etc/systemd/system/getty@tty1.service.d/override.conf"
    content: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
    mode: '0644'

# 06 Remove first-boot helpers and Plymouth
- name: 02 05 06 Remove first-boot helpers
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ debian_live_workdir }}/usr/libexec/gnome-initial-setup"
    - "{{ debian_live_workdir }}/usr/share/gnome-initial-setup"
    - "{{ debian_live_workdir }}/usr/share/applications/gnome-initial-setup.desktop"
    - "{{ debian_live_workdir }}/etc/skel/.config/autostart/gnome-initial-setup-first-login.desktop"
    - "{{ debian_live_workdir }}/etc/xdg/autostart/gnome-initial-setup.desktop"
    - "{{ debian_live_workdir }}/usr/share/plymouth"
    - "{{ debian_live_workdir }}/lib/systemd/system/plymouth-start.service"
    - "{{ debian_live_workdir }}/lib/systemd/system/plymouth-read-write.service"
    - "{{ debian_live_workdir }}/lib/systemd/system/plymouth-quit.service"
    - "{{ debian_live_workdir }}/usr/bin/plymouth"

# 07 German keyboard layout
- name: 02 05 07 Configure German keyboard
  ansible.builtin.copy:
    dest: "{{ debian_live_workdir }}/etc/default/keyboard"
    content: |
      XKBMODEL="pc105"
      XKBLAYOUT="de"
      XKBVARIANT=""
      XKBOPTIONS=""
    mode: '0644'

# 08 Mask suspend / hibernate
- name: 02 05 08 Mask suspend / hibernate
  ansible.builtin.file:
    src: /dev/null
    dest: "{{ debian_live_workdir }}/etc/systemd/system/{{ item }}"
    state: link
  loop:
    - systemd-suspend.service
    - systemd-hibernate.service
    - systemd-suspend-then-hibernate.service

# 09 Find wallpaper candidates
- name: 02 05 09 Find wallpaper candidates
  ansible.builtin.find:
    paths:
      - "{{ debian_live_workdir }}/usr/share/desktop-base/emerald-theme/wallpaper/contents/images"
      - "{{ debian_live_workdir }}/usr/share/backgrounds"
    file_type: file
  register: wallpaper_files
  ignore_errors: true

# 10 Overwrite wallpapers
- name: 02 05 10 Overwrite wallpapers
  ansible.builtin.copy:
    src: wallpaper.png
    dest: "{{ item.path }}"
    mode: '0644'
  loop: "{{ wallpaper_files.files | default([]) }}"
  when: wallpaper_files is defined

# 11 Ensure /etc/ssh exists
- name: 02 05 11 Ensure ssh directory
  ansible.builtin.file:
    path: "{{ debian_live_workdir }}/etc/ssh"
    state: directory
    mode: '0755'

# 12 Generate offline SSH host keys
- name: 02 05 12 Generate SSH host keys
  community.crypto.openssh_keypair:
    path: "{{ debian_live_workdir }}/etc/ssh/ssh_host_{{ item }}_key"
    type: "{{ item }}"
    mode: '0600'
    force: false
  loop:
    - rsa
    - ecdsa
    - ed25519


# 12a Install auto-discovery script for unknown live-boot clients
- name: 02 05 12a Install RISng discovery autostart script
  ansible.builtin.copy:
    dest: "{{ debian_live_workdir }}/usr/local/sbin/risng-discovery-autostart.sh"
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      RISNG_HOST="{{ tftp_server_ip }}"
      API_URL="http://${RISNG_HOST}:8089/api/discovery"

      # avoid flooding API if service is restarted
      STAMP=/run/risng-discovery.sent
      [ -f "$STAMP" ] && exit 0

      get_boot_iface() {
        ip route get 1.1.1.1 2>/dev/null | awk '/dev/ {for(i=1;i<=NF;i++) if($i=="dev") {print $(i+1); exit}}'
      }

      BOOT_IFACE="$(get_boot_iface || true)"
      BOOT_MAC=""
      if [ -n "${BOOT_IFACE}" ]; then
        BOOT_MAC="$(cat /sys/class/net/${BOOT_IFACE}/address 2>/dev/null | tr 'A-F' 'a-f' || true)"
      fi
      if [ -z "$BOOT_MAC" ]; then
        BOOT_MAC="$(ip -o link | awk '/link\/ether/ {print tolower($17); exit}')"
      fi

      FIRMWARE_MODE="bios"
      [ -d /sys/firmware/efi ] && FIRMWARE_MODE="uefi"

      HOSTNAME_CUR="$(hostname 2>/dev/null || true)"
      IPV4="$(hostname -I 2>/dev/null | awk '{print $1}')"
      CPU="$(awk -F: '/model name/{gsub(/^ +/,"",$2); print $2; exit}' /proc/cpuinfo 2>/dev/null || true)"
      RAM="$(awk '/MemTotal/{printf "%.1f GiB", $2/1024/1024}' /proc/meminfo 2>/dev/null || true)"
      DISK="$(lsblk -dn -o NAME,SIZE,TYPE,MODEL 2>/dev/null | awk '$3=="disk"{print $1":"$2":"$4}' | paste -sd ',' -)"

      python3 - <<PY2
      import json, urllib.request
      payload={
        "mac": "${BOOT_MAC}",
        "hostname": "${HOSTNAME_CUR}",
        "ip": "${IPV4}",
        "hardware": {
          "cpu": "${CPU}",
          "ram": "${RAM}",
          "disk": "${DISK}",
          "firmware_mode": "${FIRMWARE_MODE}",
          "boot_iface": "${BOOT_IFACE}",
          "boot_mac": "${BOOT_MAC}"
        }
      }
      req=urllib.request.Request("${API_URL}", data=json.dumps(payload).encode(), headers={"Content-Type":"application/json"})
      with urllib.request.urlopen(req, timeout=8) as r:
        r.read()
      PY2

      touch "$STAMP"

# 12b Add systemd unit to auto-run discovery collector on boot
- name: 02 05 12b Install RISng discovery systemd service
  ansible.builtin.copy:
    dest: "{{ debian_live_workdir }}/etc/systemd/system/risng-discovery.service"
    mode: '0644'
    content: |
      [Unit]
      Description=RISng live discovery collector
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/risng-discovery-autostart.sh
      Restart=no

      [Install]
      WantedBy=multi-user.target

# 12c Enable discovery service in live root
- name: 02 05 12c Enable RISng discovery service
  ansible.builtin.file:
    src: "/etc/systemd/system/risng-discovery.service"
    dest: "{{ debian_live_workdir }}/etc/systemd/system/multi-user.target.wants/risng-discovery.service"
    state: link

