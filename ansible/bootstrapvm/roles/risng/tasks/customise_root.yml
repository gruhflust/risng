# Optional: Legacy reference for root autologin on tty2
- name: Task IR-40 - Enable autologin (tty1 for root)
  copy:
    dest: "{{ risng_workdir }}/etc/systemd/system/getty@tty1.service.d/override.conf"
    content: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
    mode: "0644"

- name: Task IR-41 - Copy custom root .bashrc with IP prompt
  copy:
    src: "bashrc-root-risng"
    dest: "{{ risng_workdir }}/root/.bashrc"
    mode: "0644"

- name: Task IR-42 - Add sudoers file for {{ ssh_user }}
  copy:
    dest: "{{ risng_workdir }}/etc/sudoers.d/90-{{ ssh_user }}"
    content: "{{ ssh_user }} ALL=(ALL) NOPASSWD:ALL"
    mode: "0440"

- name: Task IR-43 - Copy SSH public key for root
  copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
    dest: "{{ risng_workdir }}/root/.ssh/authorized_keys"
    remote_src: true
    owner: root
    group: root
    mode: "0600"

- name: Task IR-44 - Enable root autologin on tty1 (optional override)
  copy:
    dest: "{{ risng_workdir }}/etc/systemd/system/getty@tty1.service.d/override.conf"
    content: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
    mode: "0644"
  when: risng_autologin_user == "root"

# Keyboard and locale configuration
- name: Task IR-45 - Configure German keyboard
  ansible.builtin.copy:
    dest: "{{ risng_workdir }}/etc/default/keyboard"
    content: |
      XKBMODEL="pc105"
      XKBLAYOUT="de"
      XKBVARIANT=""
      XKBOPTIONS=""
    mode: "0644"

- name: Task IR-46 - Set German locale
  ansible.builtin.copy:
    dest: "{{ risng_workdir }}/etc/default/locale"
    content: "LANG=de_DE.UTF-8\n"
    mode: "0644"

- name: Task IR-47 - Ensure locale is enabled
  ansible.builtin.lineinfile:
    path: "{{ risng_workdir }}/etc/locale.gen"
    line: "de_DE.UTF-8 UTF-8"
    create: true

- name: Task IR-48 - Generate locales
  ansible.builtin.command: >
    chroot {{ risng_workdir }} locale-gen