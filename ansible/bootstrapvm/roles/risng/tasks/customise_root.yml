# Injects SSH key, resolv.conf, user setup, ssh host keys

- name: Task IR-25 - Create user
  command: >
    chroot {{ risng_workdir }} useradd -m -s /bin/bash {{ ssh_user }}
  args:
    creates: "{{ risng_workdir }}/home/{{ ssh_user }}"

- name: Task IR-26 - Create .ssh directory
  file:
    path: "{{ risng_workdir }}/home/{{ ssh_user }}/.ssh"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0700"

- name: Task IR-27 - Copy SSH public key
  copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
    dest: "{{ risng_workdir }}/home/{{ ssh_user }}/.ssh/authorized_keys"
    remote_src: true
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0600"

- name: Task IR-28 - Copy resolv.conf
  copy:
    src: /etc/resolv.conf
    dest: "{{ risng_workdir }}/etc/resolv.conf"
    remote_src: true
    mode: "0644"

- name: Task IR-29 - Ensure ssh directory
  file:
    path: "{{ risng_workdir }}/etc/ssh"
    state: directory
    mode: "0755"

- name: Task IR-30 - Generate SSH host keys
  community.crypto.openssh_keypair:
    path: "{{ risng_workdir }}/etc/ssh/ssh_host_{{ item }}_key"
    type: "{{ item }}"
    mode: "0600"
    force: false
  loop: [rsa, ed25519, ecdsa]

- name: Task IR-31 - Inject fixed SSH hostkey (ed25519)
  ansible.builtin.copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519"
    dest: "{{ risng_workdir }}/etc/ssh/ssh_host_ed25519_key"
    owner: root
    group: root
    mode: "0600"

- name: Task IR-32 - Inject fixed SSH hostkey (ed25519.pub)
  ansible.builtin.copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
    dest: "{{ risng_workdir }}/etc/ssh/ssh_host_ed25519_key.pub"
    owner: root
    group: root
    mode: "0644"



- name: Task IR-33 - Enable systemd default target (multi-user)
  file:
    src: "/lib/systemd/system/multi-user.target"
    dest: "{{ risng_workdir }}/etc/systemd/system/default.target"
    state: link

- name: Task IR-34 - Enable SSH service by default
  file:
    src: "/lib/systemd/system/ssh.service"
    dest: "{{ risng_workdir }}/etc/systemd/system/multi-user.target.wants/ssh.service"
    state: link

- name: Task IR-35 - Set default hostname placeholder
  copy:
    dest: "{{ risng_workdir }}/etc/hostname"
    content: "{{ risng_default_hostname }}\n"
    mode: "0644"

- name: Task IR-36 - Install DHCP hostname helper script
  copy:
    src: "{{ role_path }}/../common/files/apply-dhcp-hostname.sh"
    dest: "{{ risng_workdir }}/usr/local/sbin/apply-dhcp-hostname.sh"
    mode: "0755"

- name: Task IR-37 - Install DHCP hostname systemd service
  template:
    src: "{{ role_path }}/../common/templates/apply-dhcp-hostname.service.j2"
    dest: "{{ risng_workdir }}/etc/systemd/system/apply-dhcp-hostname.service"
    mode: "0644"

- name: Task IR-38 - Enable DHCP hostname systemd service
  file:
    src: "../apply-dhcp-hostname.service"
    dest: "{{ risng_workdir }}/etc/systemd/system/multi-user.target.wants/apply-dhcp-hostname.service"
    state: link

- name: Task IR-39 - Create getty override directory
  file:
    path: "{{ risng_workdir }}/etc/systemd/system/getty@tty1.service.d"
    state: directory
    mode: "0755"

# Optional: Enable autologin for configured SSH user on tty1
