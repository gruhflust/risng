# Injects SSH key, resolv.conf, user setup, ssh host keys

- name: Task IR-25 - Create user
  command: >
    chroot {{ risng_workdir }} useradd -m -s /bin/bash {{ ssh_user }}
  args:
    creates: "{{ risng_workdir }}/home/{{ ssh_user }}"

- name: Task IR-26 - Create .ssh directory
  file:
    path: "{{ risng_workdir }}/home/{{ ssh_user }}/.ssh"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0700"

- name: Task IR-27 - Copy SSH public key
  copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
    dest: "{{ risng_workdir }}/home/{{ ssh_user }}/.ssh/authorized_keys"
    remote_src: true
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: "0600"

- name: Task IR-28 - Copy resolv.conf
  copy:
    src: /etc/resolv.conf
    dest: "{{ risng_workdir }}/etc/resolv.conf"
    remote_src: true
    mode: "0644"

- name: Task IR-29 - Ensure ssh directory
  file:
    path: "{{ risng_workdir }}/etc/ssh"
    state: directory
    mode: "0755"

- name: Task IR-30 - Generate SSH host keys
  community.crypto.openssh_keypair:
    path: "{{ risng_workdir }}/etc/ssh/ssh_host_{{ item }}_key"
    type: "{{ item }}"
    mode: "0600"
    force: false
  loop: [rsa, ed25519, ecdsa]

- name: Task IR-31 - Inject fixed SSH hostkey (ed25519)
  ansible.builtin.copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519"
    dest: "{{ risng_workdir }}/etc/ssh/ssh_host_ed25519_key"
    remote_src: true
    owner: root
    group: root
    mode: "0600"

- name: Task IR-32 - Inject fixed SSH hostkey (ed25519.pub)
  ansible.builtin.copy:
    src: "{{ ssh_user_home }}/.ssh/id_ed25519.pub"
    dest: "{{ risng_workdir }}/etc/ssh/ssh_host_ed25519_key.pub"
    remote_src: true
    owner: root
    group: root
    mode: "0644"



- name: Task IR-33 - Enable systemd default target (multi-user)
  file:
    src: "/lib/systemd/system/multi-user.target"
    dest: "{{ risng_workdir }}/etc/systemd/system/default.target"
    state: link

- name: Task IR-34 - Enable SSH service by default
  file:
    src: "/lib/systemd/system/ssh.service"
    dest: "{{ risng_workdir }}/etc/systemd/system/multi-user.target.wants/ssh.service"
    state: link

- name: Task IR-35 - Set default hostname placeholder
  copy:
    dest: "{{ risng_workdir }}/etc/hostname"
    content: "{{ risng_default_hostname }}\n"
    mode: "0644"

- name: Task IR-36 - Install DHCP hostname helper script
  copy:
    src: "{{ role_path }}/../common/files/apply-dhcp-hostname.sh"
    dest: "{{ risng_workdir }}/usr/local/sbin/apply-dhcp-hostname.sh"
    mode: "0755"

- name: Task IR-37 - Install DHCP hostname systemd service
  template:
    src: "{{ role_path }}/../common/templates/apply-dhcp-hostname.service.j2"
    dest: "{{ risng_workdir }}/etc/systemd/system/apply-dhcp-hostname.service"
    mode: "0644"

- name: Task IR-38 - Enable DHCP hostname systemd service
  file:
    src: "../apply-dhcp-hostname.service"
    dest: "{{ risng_workdir }}/etc/systemd/system/multi-user.target.wants/apply-dhcp-hostname.service"
    state: link


- name: Task IR-38a - Install RISng live discovery autostart script
  copy:
    dest: "{{ risng_workdir }}/usr/local/sbin/risng-discovery-autostart.sh"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      RISNG_HOST="{{ tftp_server_ip }}"
      API_URL="http://${RISNG_HOST}:8089/api/discovery"
      STAMP="/run/risng-discovery.sent"
      [ -f "$STAMP" ] && exit 0

      get_boot_iface() {
        ip route get 1.1.1.1 2>/dev/null | awk '/dev/ {for(i=1;i<=NF;i++) if($i=="dev") {print $(i+1); exit}}'
      }

      BOOT_IFACE="$(get_boot_iface || true)"
      BOOT_MAC=""
      if [ -n "${BOOT_IFACE}" ]; then
        BOOT_MAC="$(cat /sys/class/net/${BOOT_IFACE}/address 2>/dev/null | tr 'A-F' 'a-f' || true)"
      fi
      if [ -z "$BOOT_MAC" ]; then
        BOOT_MAC="$(ip -o link | awk '/link\/ether/ {print tolower($17); exit}')"
      fi

      FIRMWARE_MODE="bios"
      [ -d /sys/firmware/efi ] && FIRMWARE_MODE="uefi"

      HOSTNAME_CUR="$(hostname 2>/dev/null || true)"
      IPV4="$(hostname -I 2>/dev/null | awk '{print $1}')"
      CPU="$(awk -F: '/model name/{gsub(/^ +/,"",$2); print $2; exit}' /proc/cpuinfo 2>/dev/null || true)"
      RAM="$(awk '/MemTotal/{printf "%.1f GiB", $2/1024/1024}' /proc/meminfo 2>/dev/null || true)"
      DISK="$(lsblk -dn -o NAME,SIZE,TYPE,MODEL 2>/dev/null | awk '$3=="disk"{print $1":"$2":"$4}' | paste -sd ',' -)"

      python3 - <<PY2
      import json, urllib.request
      payload={
        "mac": "${BOOT_MAC}",
        "hostname": "${HOSTNAME_CUR}",
        "ip": "${IPV4}",
        "hardware": {
          "cpu": "${CPU}",
          "ram": "${RAM}",
          "disk": "${DISK}",
          "firmware_mode": "${FIRMWARE_MODE}",
          "boot_iface": "${BOOT_IFACE}",
          "boot_mac": "${BOOT_MAC}"
        }
      }
      req=urllib.request.Request("${API_URL}", data=json.dumps(payload).encode(), headers={"Content-Type":"application/json"})
      with urllib.request.urlopen(req, timeout=8) as r:
          r.read()
      PY2

      touch "$STAMP"

- name: Task IR-38b - Install RISng discovery systemd service
  copy:
    dest: "{{ risng_workdir }}/etc/systemd/system/risng-discovery.service"
    mode: "0644"
    content: |
      [Unit]
      Description=RISng live discovery collector
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/risng-discovery-autostart.sh
      Restart=no

      [Install]
      WantedBy=multi-user.target

- name: Task IR-38c - Enable RISng discovery service
  file:
    src: "../risng-discovery.service"
    dest: "{{ risng_workdir }}/etc/systemd/system/multi-user.target.wants/risng-discovery.service"
    state: link

- name: Task IR-39 - Create getty override directory
  file:
    path: "{{ risng_workdir }}/etc/systemd/system/getty@tty1.service.d"
    state: directory
    mode: "0755"

