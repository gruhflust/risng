# pnt_setup_v26  – 3-phase PXE setup: update → image build → PXE serve
###############################################################################
- name: 00 Initial phase  System update and DNS healing
  hosts: bootstrapvm
  become: true
  gather_facts: true   
  
  pre_tasks:
    - name: 00.00 Enable NTP time sync (best effort)
      ansible.builtin.command: timedatectl set-ntp true
      changed_when: false
      failed_when: false

    - name: 00.00a Collect available services
      ansible.builtin.service_facts:

    - name: 00.00b Restart systemd-timesyncd when available
      ansible.builtin.systemd:
        name: systemd-timesyncd
        state: restarted
      when: "'systemd-timesyncd.service' in ansible_facts.services"
      failed_when: false

    - name: 00.00c Check NTP synchronization state (best effort)
      ansible.builtin.command: timedatectl show -p NTPSynchronized --value
      register: ntp_sync_state
      changed_when: false
      failed_when: false

    - name: 00.00d Warn if system time is not yet synchronized
      ansible.builtin.debug:
        msg: "Warning: NTPSynchronized={{ ntp_sync_state.stdout | default('unknown') }}. Trying fallback wall-clock sync from HTTPS Date header."
      when: (ntp_sync_state.stdout | default('no') | trim) != 'yes'

    - name: 00.00e Get reference UTC time from deb.debian.org (fallback)
      ansible.builtin.shell: |
        python3 - <<'PY'
        import urllib.request
        from email.utils import parsedate_to_datetime
        h = urllib.request.urlopen('https://deb.debian.org', timeout=10).headers.get('Date', '')
        if not h:
            raise SystemExit(1)
        dt = parsedate_to_datetime(h).astimezone()
        print(dt.strftime('%Y-%m-%d %H:%M:%S'))
        PY
      args:
        executable: /bin/bash
      register: reference_time
      changed_when: false
      failed_when: false
      when: (ntp_sync_state.stdout | default('no') | trim) != 'yes'

    - name: 00.00f Apply fallback system time when reference time is available
      ansible.builtin.command: "timedatectl set-time '{{ reference_time.stdout | trim }}'"
      changed_when: true
      failed_when: false
      when:
        - (ntp_sync_state.stdout | default('no') | trim) != 'yes'
        - (reference_time.stdout | default('') | trim) | length > 0

    - name: 00.00g Show current system time status
      ansible.builtin.command: timedatectl status
      register: timedatectl_status
      changed_when: false

    - name: 00.00h Debug time status (for snapshot-resume drift)
      ansible.builtin.debug:
        var: timedatectl_status.stdout_lines

    - import_tasks: "{{ playbook_dir }}/detect_interfaces.yml"

    - name: 00.10 Ensure dedicated risng operator group exists
      ansible.builtin.group:
        name: risng
        state: present

    - name: 00.11 Ensure dedicated risng operator user exists
      ansible.builtin.user:
        name: risng
        group: risng
        shell: /bin/bash
        create_home: true
        state: present

    - name: 00.12 Ensure risng ~/.ssh directory exists
      ansible.builtin.file:
        path: /home/risng/.ssh
        state: directory
        owner: risng
        group: risng
        mode: "0700"

    - name: 00.12a Ensure risng SSH keypair exists on staging host
      ansible.builtin.command: >-
        sudo -u risng -H bash -lc 'test -s /home/risng/.ssh/id_ed25519 && test -s /home/risng/.ssh/id_ed25519.pub || ssh-keygen -t ed25519 -a 100 -N "" -f /home/risng/.ssh/id_ed25519'
      changed_when: true

    - name: 00.13 Probe bootstrap invoker SSH public key candidates (controller context)
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/id_ed25519.pub"
        - "{{ lookup('ansible.builtin.env', 'HOME') }}/.ssh/id_rsa.pub"
        - "/root/.ssh/id_ed25519.pub"
        - "/root/.ssh/id_rsa.pub"
      register: risng_operator_pubkey_stats
      changed_when: false
      delegate_to: localhost
      become: false

    - name: 00.14 Read first available bootstrap invoker SSH public key
      ansible.builtin.slurp:
        src: "{{ (risng_operator_pubkey_stats.results | selectattr('stat.exists', 'equalto', true) | map(attribute='item') | list | first) }}"
      register: risng_operator_pubkey_raw
      when: (risng_operator_pubkey_stats.results | selectattr('stat.exists', 'equalto', true) | list | length) > 0
      no_log: true
      delegate_to: localhost
      become: false

    - name: 00.15 Authorize bootstrap invoker SSH key for risng user
      ansible.posix.authorized_key:
        user: risng
        key: "{{ risng_operator_pubkey_raw.content | b64decode | trim }}"
        state: present
      when:
        - risng_operator_pubkey_raw is defined
        - risng_operator_pubkey_raw.content is defined

    - name: 00.15a Fallback authorize risng self key when invoker key is missing
      ansible.builtin.shell: |
        set -euo pipefail
        cat /home/risng/.ssh/id_ed25519.pub >> /home/risng/.ssh/authorized_keys
        sort -u /home/risng/.ssh/authorized_keys -o /home/risng/.ssh/authorized_keys
        chown risng:risng /home/risng/.ssh/authorized_keys
        chmod 600 /home/risng/.ssh/authorized_keys
      args:
        executable: /bin/bash
      when: risng_operator_pubkey_raw is not defined or risng_operator_pubkey_raw.content is not defined

    - name: 00.15b Warn when bootstrap invoker SSH key was not found (self-key fallback used)
      ansible.builtin.debug:
        msg: >-
          No readable bootstrap invoker SSH public key found; used /home/risng/.ssh/id_ed25519.pub fallback in authorized_keys.
      when: risng_operator_pubkey_raw is not defined or risng_operator_pubkey_raw.content is not defined

    - name: 00.16 Build candidate source paths for RISng code checkout
      ansible.builtin.set_fact:
        risng_code_source_candidates:
          - "/home/{{ lookup('ansible.builtin.env', 'SUDO_USER') | default('', true) }}/botrepo/risng_code"
          - "/home/{{ lookup('ansible.builtin.env', 'SUDO_USER') | default('', true) }}/risng"
          - "/home/{{ lookup('ansible.builtin.env', 'USER') | default('', true) }}/botrepo/risng_code"
          - "/home/{{ lookup('ansible.builtin.env', 'USER') | default('', true) }}/risng"
          - "/root/botrepo/risng_code"

    - name: 00.17 Probe RISng code source candidates
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ risng_code_source_candidates | unique }}"
      register: risng_code_source_candidate_stats
      changed_when: false

    - name: 00.18 Pick first existing RISng code source path
      ansible.builtin.set_fact:
        risng_code_source_path: "{{ (risng_code_source_candidate_stats.results | selectattr('stat.isdir', 'defined') | selectattr('stat.isdir', 'equalto', true) | map(attribute='item') | list | first) | default('') }}"

    - name: 00.19 Ensure /home/risng/risng exists
      ansible.builtin.file:
        path: /home/risng/risng
        state: directory
        owner: risng
        group: risng
        mode: "0755"

    - name: 00.20 Sync RISng code into /home/risng/risng when source exists
      ansible.builtin.shell: |
        set -euo pipefail
        if command -v rsync >/dev/null 2>&1; then
          rsync -a --delete "{{ risng_code_source_path }}/" "/home/risng/risng/"
        else
          rm -rf /home/risng/risng/*
          cp -a "{{ risng_code_source_path }}/." "/home/risng/risng/"
        fi
        chown -R risng:risng /home/risng/risng
      args:
        executable: /bin/bash
      when: (risng_code_source_path | default('') | length) > 0

    - name: 00.21 Warn when no RISng code source path was found
      ansible.builtin.debug:
        msg: >-
          No local RISng code source directory found for bootstrap copy.
          Checked: {{ risng_code_source_candidates | unique | join(', ') }}
      when: (risng_code_source_path | default('') | length) == 0

    - name: 00.22 Ensure risng .bashrc links to RISng management template
      ansible.builtin.file:
        src: /home/risng/risng/ansible/bootstrapvm/roles/management/templates/bashrc.j2
        dest: /home/risng/.bashrc
        owner: risng
        group: risng
        state: link
        force: true

    - name: 00.23 Ensure risng .bash_profile sources .bashrc
      ansible.builtin.copy:
        dest: /home/risng/.bash_profile
        owner: risng
        group: risng
        mode: "0644"
        content: |
          # managed by risng-setup
          if [ -f "$HOME/.bashrc" ]; then
            . "$HOME/.bashrc"
          fi

    - name: 00.24 Debug RISng user bootstrap summary
      ansible.builtin.debug:
        msg:
          - "RISng effective ssh_user={{ ssh_user }} ssh_user_home={{ ssh_user_home }}"
          - "RISng source path for sync={{ risng_code_source_path | default('UNRESOLVED') }}"
          - "RISng bashrc link=/home/risng/.bashrc -> /home/risng/risng/ansible/bootstrapvm/roles/management/templates/bashrc.j2"


  vars_files:
    - ../host_vars/bootstrapvm.yml

  roles:
    - systemupdate

###############################################################################
- name: 01 Online phase  Build PXE export (internet mode)
  hosts: bootstrapvm
  become: true
  vars_files:
    - ../host_vars/bootstrapvm.yml

  pre_tasks:
    - import_tasks: detect_interfaces.yml

    - name: 01.01 Bring up WAN NIC and disable PXE NIC
      shell: |
        ip link set {{ internetinterface }} up
        ip addr flush dev {{ risng_lan_interface }} || true
        ip link set {{ risng_lan_interface }} down || true
      args:
        executable: /bin/bash

  roles:
    - management
    - tools
    - webserver
    - gopass
    # - debian-live
    # - netinstall
    - risng
    - risng_install
#
###############################################################################
- name: 02 Offline phase  Serve PXE (DHCP/DNS/TFTP)
  hosts: bootstrapvm
  become: true
  vars_files:
    - ../host_vars/bootstrapvm.yml

  pre_tasks:
    - import_tasks: "{{ playbook_dir }}/detect_interfaces.yml"

    - name: 02.01 bring up PXE NIC with static IP
      shell: |
        ip addr flush dev {{ risng_lan_interface }} || true
        ip addr add {{ dhcp_gateway }}/{{ dhcp_prefix }} dev {{ risng_lan_interface }}
        ip link set {{ risng_lan_interface }} up
      args:
        executable: /bin/bash
  
  #  - name: 02.01 Deactivate WAN and bring up PXE NIC with static IP
  #    shell: |
  #      ip link set {{ internetinterface }} down || true
  #      ip addr flush dev {{ risng_lan_interface }} || true
  #      ip addr add {{ dhcp_gateway }}/{{ dhcp_prefix }} dev {{ risng_lan_interface }}
  #      ip link set {{ risng_lan_interface }} up
  #    args:
  #      executable: /bin/bash



  roles:
    - pxe_assemble
    - dns
    - dhcp

  post_tasks:
    - import_role:
        name: management
        tasks_from: 20_persist_network.yml   # ensures NIC config survives reboot
    - name: 02.97 Replace risng .bashrc with symlink to management template
      ansible.builtin.file:
        src: "{{ ssh_user_home }}/risng/ansible/bootstrapvm/roles/management/templates/bashrc.j2"
        dest: "{{ ssh_user_home }}/.bashrc"
        owner: "{{ ssh_user }}"
        group: "{{ ssh_user }}"
        state: link
        force: true

    - name: 02.98 Ensure risng wallpaper directory exists
      ansible.builtin.file:
        path: "{{ ssh_user_home }}/.local/share/backgrounds"
        state: directory
        owner: "{{ ssh_user }}"
        group: "{{ ssh_user }}"
        mode: "0755"

    - name: 02.98 Deploy risng wallpaper base image
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/roles/management/files/risng.background.png"
        dest: "{{ ssh_user_home }}/.local/share/backgrounds/risng.background.png"
        owner: "{{ ssh_user }}"
        group: "{{ ssh_user }}"
        mode: "0644"

    - name: 02.98 Determine deployed RISng commit
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ ssh_user_home | default(ansible_env.HOME | default('~')) }}/botrepo"
          - log
          - -1
          - --pretty=format:%h
      register: risng_git_commit
      changed_when: false
      failed_when: false

    - name: 02.98 Determine deployed RISng branch
      ansible.builtin.command:
        argv:
          - git
          - -C
          - "{{ ssh_user_home | default(ansible_env.HOME | default('~')) }}/botrepo"
          - rev-parse
          - --abbrev-ref
          - HEAD
      register: risng_git_branch
      changed_when: false
      failed_when: false

    - name: 02.98 Build risng wallpaper timestamp label (UTC)
      ansible.builtin.command:
        argv:
          - date
          - -u
          - "+%F %H:%M:%S UTC"
      register: risng_wallpaper_timestamp
      changed_when: false

    - name: 02.98 Compose risng wallpaper annotation label
      ansible.builtin.set_fact:
        risng_wallpaper_label: >-
          Controlhost RISng - staged on {{ risng_wallpaper_timestamp.stdout | default('timestamp unavailable', true) }}
          (git-commit: {{ risng_git_commit.stdout | default('unknown', true) | trim | default('unknown') }} [branch {{ risng_git_branch.stdout | default('unknown', true) | trim | default('unknown') }}])
      changed_when: false

    - name: 02.98 Annotate risng wallpaper with timestamp
      ansible.builtin.command:
        argv:
          - mogrify
          - -gravity
          - north
          - -pointsize
          - "36"
          - -fill
          - "#FFFFFF"
          - -undercolor
          - "#000000B3"
          - -annotate
          - "+0+120"
          - "{{ risng_wallpaper_label }}"
          - "{{ ssh_user_home }}/.local/share/backgrounds/risng.background.png"
      become: true
      become_user: "{{ ssh_user }}"
      when:
        - risng_wallpaper_label | default('') | length > 0

    - name: 02.98 Apply risng wallpaper in GNOME
      community.general.dconf:
        key: /org/gnome/desktop/background/picture-uri
        value: "'file://{{ ssh_user_home }}/.local/share/backgrounds/risng.background.png'"
        state: present
      become: true
      become_user: "{{ ssh_user }}"

    - name: 02.98 Apply risng dark mode wallpaper in GNOME
      community.general.dconf:
        key: /org/gnome/desktop/background/picture-uri-dark
        value: "'file://{{ ssh_user_home }}/.local/share/backgrounds/risng.background.png'"
        state: present
      become: true
      become_user: "{{ ssh_user }}"
