---
- name: Run deep Doxygen analysis on ~/doxygen and write results to ~/doxygen_result
  hosts: bootstrapvm
  become: false
  gather_facts: false
  vars_files:
    - ../host_vars/bootstrapvm.yml

  vars:
    run_user: "{{ lookup('env', 'USER') }}"
    run_home: "{{ lookup('env', 'HOME') }}"
    doxygen_input_dir: "{{ run_home }}/doxygen"
    doxygen_output_dir: "{{ run_home }}/doxygen_result"
    doxygen_mirror_dir: "{{ doxygen_output_dir }}/enriched_src"
    doxygen_config_file: "{{ doxygen_output_dir }}/Doxyfile"
    doxygen_warnings_log: "{{ doxygen_output_dir }}/doxygen-warnings.log"
    doxygen_xml_dir: "{{ doxygen_output_dir }}/xml"
    doxygen_pseudocode_file: "{{ doxygen_output_dir }}/pseudocode-overview.md"

  tasks:
    - name: Ensure doxygen + graphviz + rsync are installed
      ansible.builtin.apt:
        name:
          - doxygen
          - graphviz
          - rsync
          - python3
        state: present
        update_cache: true
      become: true

    - name: Ensure input directory exists
      ansible.builtin.stat:
        path: "{{ doxygen_input_dir }}"
      register: doxygen_input_stat

    - name: Fail if input directory is missing
      ansible.builtin.assert:
        that:
          - doxygen_input_stat.stat.exists
          - doxygen_input_stat.stat.isdir
        fail_msg: >-
          Input directory '{{ doxygen_input_dir }}' not found. Create/populate it first,
          then re-run alias 'doxygen'.

    - name: Ensure output directories exist (owned by run user)
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ doxygen_output_dir }}"
        - "{{ doxygen_mirror_dir }}"
      become: false

    - name: Ensure output root ownership before run
      ansible.builtin.file:
        path: "{{ doxygen_output_dir }}"
        state: directory
        recurse: true
        owner: "{{ run_user }}"
        group: "{{ run_user }}"
      become: true

    - name: Mirror input sources to result workspace (1:1)
      ansible.builtin.command: >-
        rsync -a --delete {{ doxygen_input_dir }}/ {{ doxygen_mirror_dir }}/
      changed_when: true
      become: false

    - name: Enrich mirrored sources with auto-comment headers
      ansible.builtin.command: >-
        python3 {{ playbook_dir }}/scripts/enrich_sources.py --root {{ doxygen_mirror_dir }}
      register: doxygen_enrich
      changed_when: "'enriched_files=' in doxygen_enrich.stdout"
      become: false

    - name: Write Doxygen config for deep analysis (on enriched mirror)
      ansible.builtin.copy:
        dest: "{{ doxygen_config_file }}"
        mode: '0644'
        content: |
          PROJECT_NAME           = "doxygen-deep-analysis"
          PROJECT_BRIEF          = "Auto-generated deep analysis"
          OUTPUT_DIRECTORY       = "{{ doxygen_output_dir }}"
          CREATE_SUBDIRS         = NO
          ALLOW_UNICODE_NAMES    = YES

          INPUT                  = "{{ doxygen_mirror_dir }}"
          FILE_PATTERNS          = *.c *.cc *.cxx *.cpp *.c++ *.h *.hh *.hxx *.hpp *.h++ *.java *.py *.cs *.js *.ts *.php *.go *.rs *.swift *.m *.mm *.md
          RECURSIVE              = YES
          EXCLUDE_SYMLINKS       = NO

          EXTRACT_ALL            = YES
          EXTRACT_PRIVATE        = YES
          EXTRACT_STATIC         = YES
          EXTRACT_LOCAL_CLASSES  = YES
          EXTRACT_ANON_NSPACES   = YES
          HIDE_UNDOC_MEMBERS     = NO
          HIDE_UNDOC_CLASSES     = NO

          SOURCE_BROWSER         = YES
          INLINE_SOURCES         = YES
          REFERENCED_BY_RELATION = YES
          REFERENCES_RELATION    = YES
          VERBATIM_HEADERS       = YES

          WARNINGS               = YES
          WARN_IF_UNDOCUMENTED   = YES
          WARN_IF_DOC_ERROR      = YES
          WARN_NO_PARAMDOC       = NO
          WARN_LOGFILE           = "{{ doxygen_warnings_log }}"

          GENERATE_HTML          = YES
          HTML_OUTPUT            = html
          GENERATE_TREEVIEW      = YES
          FULL_SIDEBAR           = YES

          GENERATE_LATEX         = NO
          GENERATE_XML           = YES
          XML_OUTPUT             = xml

          HAVE_DOT               = YES
          DOT_IMAGE_FORMAT       = svg
          CALL_GRAPH             = YES
          CALLER_GRAPH           = YES
          CLASS_DIAGRAMS         = YES
          COLLABORATION_GRAPH    = YES
          UML_LOOK               = YES
          DOT_MULTI_TARGETS      = YES
          DOT_NUM_THREADS        = 0

          QUIET                  = NO
      become: false

    - name: Run doxygen
      ansible.builtin.command: "doxygen {{ doxygen_config_file }}"
      changed_when: true
      become: false

    - name: Generate pseudocode summary from Doxygen XML
      ansible.builtin.command: >-
        python3 {{ playbook_dir }}/scripts/generate_pseudocode.py
        --xml-dir {{ doxygen_xml_dir }}
        --out {{ doxygen_pseudocode_file }}
      changed_when: true
      become: false

    - name: Ensure final result ownership for run user
      ansible.builtin.file:
        path: "{{ doxygen_output_dir }}"
        state: directory
        recurse: true
        owner: "{{ run_user }}"
        group: "{{ run_user }}"
      become: true

    - name: Print result hint
      ansible.builtin.debug:
        msg:
          - "Doxygen analysis complete."
          - "Mirrored+enriched sources: {{ doxygen_mirror_dir }}"
          - "HTML report: {{ doxygen_output_dir }}/html/index.html"
          - "Pseudocode overview: {{ doxygen_pseudocode_file }}"
          - "Warnings log: {{ doxygen_warnings_log }}"
